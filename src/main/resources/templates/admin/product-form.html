<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Product - Pet Shop Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/pet-form.css}">
</head>
<body>

<div class="main-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="form-container px-3">
    <div class="mb-4 text-start ps-2">
      <h2 th:if="${formMode == 'edit'}">Edit a product</h2>
      <h2 th:if="${formMode == 'add'}">Create a product</h2>
      <p class="text-secondary small">Provide information and description for the new shop item.</p>
    </div>

    <div class="card pet-card border-0 shadow-lg p-4">
      <form th:action="@{/admin/product/save}"
            method="POST"
            th:object="${selectedPro}"
            enctype="multipart/form-data">

        <input type="hidden" th:field="*{productId}">

        <input type="hidden" th:field="*{imageUrl}">

        <div class="row g-4">

          <div class="col-lg-7">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-box-open text-warning me-1"></i> Product Name <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control shadow-none" placeholder="e.g. Premium Cat Dry Food" required th:field="*{name}">
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold text-secondary small" for="cates">
                  <i class="fa-solid fa-layer-group text-warning me-1"></i> Category
                </label>
                <select class="form-select shadow-none" id="cates" th:field="*{category}">
                  <option th:each="x : ${cates}"
                          th:value="${x.categoryID}"
                          th:text="${x.name}"
                          th:selected="${selectedPro.category != null and selectedPro.category.categoryID == x.categoryID}"
                  >Select Category </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-warehouse text-warning me-1"></i> Stock Quantity
                </label>
                <input type="number" class="form-control shadow-none"
                       value=""
                       min="0"
                       max="100"
                       th:field="*{stock}">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold small text-secondary">Price (VNĐ)</label>

                <input type="text"
                       id="priceDisplay"
                       class="form-control shadow-none"
                       placeholder="0">

                <input type="hidden"
                       th:field="*{price}"
                       id="priceActual">

                <span th:errors="*{price}" style="color: #ffa54f"></span>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="bi bi-percent text-warning me-1"></i> Discount (%)
                </label>
                <input type="number" class="form-control shadow-none" value="0" th:field="*{discountPercent}">
              </div>

              <div class="col-md-6" th:if="${formMode == 'edit'}">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-toggle-on text-warning me-1"></i> Product Status
                </label>
                <select class="form-select shadow-none" th:field="*{isActive}">
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </div>

            </div>
          </div>

          <div class="col-lg-5">
            <label class="form-label fw-semibold text-secondary small">
              <i class="bi bi-image me-1 text-warning"></i> Product Image
            </label>

            <div class="upload-container border rounded-3 d-flex flex-column align-items-center justify-content-center bg-light p-4 text-center h-100"
                 style="min-height: 380px; border-style: dashed !important; position: relative;">

              <div id="preview-box" class="mb-3"
                   th:style="${selectedPro.imageUrl != null && !selectedPro.imageUrl.isEmpty() ? 'display:block' : 'display:none'}">
                <img id="img-preview"
                     th:src="@{${selectedPro.imageUrl != null && selectedPro.imageUrl.startsWith('/uploads/') ? selectedPro.imageUrl : '/uploads/' + selectedPro.imageUrl}}"
                     class="img-thumbnail shadow-sm"
                     style="max-height: 250px; max-width: 100%; object-fit: contain;" alt="Product Preview">
              </div>

              <div id="placeholder-box"
                   th:style="${selectedPro.imageUrl != null && !selectedPro.imageUrl.isEmpty() ? 'display:none' : 'display:block'}">
                <i class="fa-solid fa-cloud-arrow-up fs-1 text-warning mb-3"></i>
                <p class="small text-muted mb-3">Click to upload product image</p>
              </div>

              <label for="file-upload" class="btn btn-outline-warning btn-sm px-4 shadow-sm mt-auto">
                Choose File
              </label>

              <input id="file-upload"
                     type="file"
                     name="imageFile"
                     accept="image/png, image/jpeg, image/jpg"
                     class="d-none"
                     onchange="previewImage(this)">

              <div id="file-name" class="small text-muted mt-3 text-break">
         <span th:if="${selectedPro.imageUrl != null && !selectedPro.imageUrl.isEmpty()}"
               class="text-success fw-medium">
            <i class="fa-solid fa-check-circle"></i> Image Loaded
         </span>
                <span th:unless="${selectedPro.imageUrl != null && !selectedPro.imageUrl.isEmpty()}">
            No file chosen
         </span>
              </div>
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label fw-semibold text-secondary small">
              <i class="bi bi-chat-left-text-fill text-warning me-1"></i> Description
            </label>
            <textarea class="form-control shadow-none" rows="4" placeholder="Provide detailed information about the product..." th:field="*{description}"></textarea>
          </div>

          <div class="col-md-12 border-top pt-4 mt-2 d-flex gap-3 justify-content-end">
            <a th:href="@{/admin/manage-product}" class="btn btn-pill-cancel px-4 py-2 text-decoration-none text-dark">Cancel</a>
            <button type="submit" class="btn btn-save-pill px-5 py-2 shadow-sm text-white fw-bold">
              Save Product
            </button>
          </div>

          <p>
            <input type="hidden" name="mode" th:value="${formMode}">
          </p>

        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const displayInput = document.getElementById('priceDisplay');
    const actualInput = document.getElementById('priceActual');

    // Hàm format số theo chuẩn Việt Nam (vd: 450000 -> 450.000)
    function formatCurrency(value) {
      if (!value) return '';
      // Loại bỏ tất cả ký tự không phải là số (bao gồm cả dấu phẩy, chấm)
      let number = value.toString().replace(/\D/g, '');
      if (number === '') return '';
      // Format với dấu chấm phân cách hàng nghìn
      return new Intl.NumberFormat('vi-VN').format(number);
    }

    // 1. Khi load trang (trường hợp Edit), format dữ liệu có sẵn từ database
    if (actualInput.value) {
      // Lấy giá trị nguyên thủy từ Thymeleaf render ra, bỏ phần thập phân nếu có
      let initValue = actualInput.value.split('.')[0].split(',')[0];
      displayInput.value = formatCurrency(initValue);
      actualInput.value = initValue; // Cập nhật lại số nguyên
    }

    // 2. Xử lý khi người dùng đang gõ vào ô input
    displayInput.addEventListener('input', function(e) {
      // Lấy giá trị chỉ chứa số
      let rawValue = this.value.replace(/\D/g, '');

      // Cập nhật giá trị raw vào thẻ hidden để gửi lên server (Thymeleaf nhận)
      actualInput.value = rawValue;

      // Format lại và hiển thị cho người dùng
      this.value = formatCurrency(rawValue);
    });
  });
</script>

<script>
  function previewImage(input) {
    const fileName = document.getElementById('file-name');
    const previewBox = document.getElementById('preview-box');
    const placeholderBox = document.getElementById('placeholder-box');
    const imgPreview = document.getElementById('img-preview');

    if (input.files && input.files[0]) {
      // Cập nhật tên file và đổi màu xanh
      fileName.innerHTML = `<span class="text-success fw-medium"><i class="fa-solid fa-check-circle"></i> ${input.files[0].name}</span>`;

      const reader = new FileReader();
      reader.onload = function(e) {
        imgPreview.src = e.target.result;
        previewBox.style.display = 'block'; // Hiện ảnh
        if(placeholderBox) placeholderBox.style.display = 'none'; // Ẩn đám mây
      }
      reader.readAsDataURL(input.files[0]);
    } else {
      // Trường hợp user ấn cancel, không chọn file nữa
      fileName.innerHTML = '<span>No file chosen</span>';
      previewBox.style.display = 'none'; // Ẩn ảnh
      if(placeholderBox) placeholderBox.style.display = 'block'; // Hiện lại đám mây
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
