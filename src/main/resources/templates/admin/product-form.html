<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Product - Pet Shop Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/pet-form.css}">
</head>
<body>

<div class="main-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="form-container px-3">
    <div class="mb-4 text-start ps-2">
      <h2 class="fw-bold text-dark mb-0">Add New Product</h2>
      <p class="text-secondary small">Provide information and description for the new shop item.</p>
    </div>

    <div class="card pet-card border-0 shadow-lg p-4">
      <form th:action="@{/admin/products/save}" method="POST" enctype="multipart/form-data">
        <div class="row g-4">

          <div class="col-lg-7">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-box-open text-warning me-1"></i> Product Name <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control shadow-none" placeholder="e.g. Premium Cat Dry Food" required>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-layer-group text-warning me-1"></i> Category
                </label>
                <select class="form-select shadow-none">
                  <option value="" selected disabled>Select Category</option>
                  <option value="1">Food</option>
                  <option value="2">Toys</option>
                  <option value="3">Accessories</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-warehouse text-warning me-1"></i> Stock Quantity
                </label>
                <input type="number" class="form-control shadow-none" value="0">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="fa-solid fa-tag text-warning me-1"></i> Price ($)
                </label>
                <input type="number" step="0.01" class="form-control shadow-none" placeholder="0.00">
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold text-secondary small">
                  <i class="bi bi-percent text-warning me-1"></i> Discount (%)
                </label>
                <input type="number" class="form-control shadow-none" value="0">
              </div>
            </div>
          </div>

          <div class="col-lg-5">
            <label class="form-label fw-semibold text-secondary small">
              <i class="bi bi-image me-1 text-warning"></i> Product Image
            </label>
            <div class="upload-container border border-dashed rounded-3 d-flex flex-column align-items-center justify-content-center bg-light p-4 text-center h-100" style="min-height: 280px;">
              <i class="fa-solid fa-cloud-arrow-up fs-1 text-warning mb-3"></i>
              <p class="small text-muted mb-3">Click to upload or drag & drop image</p>

              <div class="custom-file-upload w-100">
                <label for="file-upload" class="btn btn-outline-warning btn-sm px-4 shadow-sm">
                  Choose File
                </label>
                <input id="file-upload" type="file" class="d-none" accept="image/*" onchange="previewFile(this)">
                <div id="file-name" class="small text-muted mt-2">No file chosen</div>
              </div>

              <div class="mt-3 d-none" id="preview-box">
                <img src="" id="img-preview" class="img-fluid rounded shadow-sm" style="max-height: 120px;">
              </div>
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label fw-semibold text-secondary small">
              <i class="bi bi-chat-left-text-fill text-warning me-1"></i> Description
            </label>
            <textarea class="form-control shadow-none" rows="4" placeholder="Provide detailed information about the product..."></textarea>
          </div>

          <div class="col-md-12 border-top pt-4 mt-2 d-flex gap-3 justify-content-end">
            <button type="button" class="btn btn-pill-cancel px-4 py-2">Cancel</button>
            <button type="submit" class="btn btn-save-pill px-5 py-2 shadow-sm text-white fw-bold">
              Save Product
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>

<script>
  function previewFile(input) {
    const fileName = document.getElementById('file-name');
    const previewBox = document.getElementById('preview-box');
    const imgPreview = document.getElementById('img-preview');

    if (input.files && input.files[0]) {
      fileName.textContent = input.files[0].name;
      const reader = new FileReader();
      reader.onload = function(e) {
        imgPreview.src = e.target.result;
        previewBox.classList.remove('d-none');
      }
      reader.readAsDataURL(input.files[0]);
    } else {
      fileName.textContent = "No file chosen";
      previewBox.classList.add('d-none');
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
