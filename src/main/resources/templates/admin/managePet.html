<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/managePet.css"/>
    <title>Pet Management System</title>
</head>
<body>
<div class="app-container">
    <header class="page-header py-4 shadow-sm mb-4">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 mb-1 fw-bold text-dark">Pet Management System</h1>
            </div>
            <a th:href="@{/admin/pet/new}"
               class="btn btn-add-new d-flex align-items-center gap-2 px-4 py-2 shadow-sm text-decoration-none">
                <span class="fs-4">+</span> Add New Pet
            </a>
        </div>
    </header>

    <main class="container-fluid px-4">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-white py-3 border-0">
                <div class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <div class="search-box position-relative">
                            <input type="text" class="form-control rounded-pill ps-5"
                                   placeholder="Search pet by name...">
                            <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted">🔍</span>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select rounded-pill">
                            <option selected>Categories</option>
                            <option>Dogs</option>
                            <option>Cats</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-uppercase small fw-bold">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Image</th>
                        <th>Pet Name</th>
                        <th>Breed</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Price</th>
                        <th>Discount</th>
                        <th>Available</th>
                        <th class="text-end pe-4">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${pets}">
<!--                        <td class="ps-4 fw-bold" th:text="${'#' + p.petId}"></td>-->

                        <!-- Image Base64 -->
                        <td>
                            <img th:src="${p.imageUrl}" class="rounded-3 border" alt="pet" width="50" height="50">
                        </td>

                        <td>
                            <div class="fw-bold text-dark" th:text="${p.name}"></div>
                        </td>

                        <td th:text="${p.breed}"></td>
                        <td th:text="${p.ageMonths + ' Months'}"></td>

                        <!-- Gender -->
                        <td>
        <span th:class="'badge rounded-pill ' +
            (p.gender == 'Male' ? 'bg-info-subtle text-info' : 'bg-danger-subtle text-danger')"
              th:text="${p.gender}">
        </span>
                        </td>

                        <!-- Price -->
                        <td class="fw-bold text-dark" th:text="${'$' + p.price}"></td>

                        <!-- Discount -->
                        <td th:text="${p.discountPercent != null ? '-' + p.discountPercent + '%' : 'None'}"
                            th:class="${p.discountPercent != null ? 'text-danger' : 'text-muted'}">
                        </td>

                        <!-- Availability -->
                        <td>
        <span th:class="'badge rounded-pill px-3 ' +
            (p.isAvailable ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning')"
              th:text="${p.isAvailable ? 'In Stock' : 'Reserved'}">
        </span>
                        </td>

                        <!-- Actions -->
                        <td class="text-end pe-4">
                            <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                                <a th:href="@{'/admin/pet/edit/' + ${p.petID}}"
                                   class="btn btn-sm btn-outline-secondary border-0 px-3">
                                    Edit
                                </a>

                                <a th:href="@{'/admin/pet/delete/' + ${p.petID}}"
                                   class="btn btn-sm btn-outline-danger border-0 px-3"
                                   onclick="return confirm('Are you sure you want to delete this pet?')">
                                    Delete
                                </a>
                            </div>
                        </td>

                    </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
