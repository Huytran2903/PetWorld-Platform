<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Reuse admin dashboard styling for consistent UI -->
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}"/>
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

    <style>
        .btn-orange {
            background-color: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-orange:hover { 
            background-color: #e89445;
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-view {
            background-color: #f8f9fa;
            color: #2463eb;
            border: 1px solid #eef0f2;
            border-radius: 8px;
            padding: 6px 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-view:hover {
            background-color: #eceef1;
            transform: translateY(-1px);
            color: #1d4ed8;
        }
        .action-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .table-card { padding: 30px; }
        .badge-status {
            min-width: 100px;
            text-align: center;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-dark" th:href="@{/admin/dashboard}">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>

        <div class="ms-auto d-flex align-items-center">
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-profile"
                   id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                    <img th:src="@{/images/logo-petshop.png}" alt="avatar" class="user-avatar">
                    <div class="d-none d-sm-block text-start">
                        <div class="fw-bold" style="font-size: 14px;" th:text="${session.loggedInAccount?.fullName ?: 'Admin'}">Admin</div>
                        <div class="small text-white-50" style="font-size: 12px; line-height: 1;">Admin</div>
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser1">
                    <li><a class="dropdown-item" th:href="@{/auth/viewProfile}">Profile</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item text-danger" th:href="@{/logout}">Sign out</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='appointments')}"></div>

    <div class="container-fluid py-4 px-md-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <h2 class="fw-bold mb-0">Manage Appointments</h2>
            <a th:href="@{/admin/dashboard}" class="btn btn-primary d-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-4 header-orange-custom">
                <h4 class="fw-bold mb-0 text-white">Appointments</h4>

                <div class="d-flex gap-2">
                    <div class="input-group input-group-sm" style="width: 280px;">
                        <span class="input-group-text bg-white border-0" style="border-radius: 8px 0 0 8px;">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control form-control-sm border-0" placeholder="Search..." style="border-radius: 0 8px 8px 0;">
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Appointment Code</th>
                        <th>Customer ID</th>
                        <th>Pet ID</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.appointmentCode}">CODE</td>
                        <td th:text="${appt.customerId}">CUSTOMER</td>
                        <td th:text="${appt.petId}">PET</td>
                        <td th:text="${#temporals.format(appt.appointmentDate, 'dd.MM.yyyy HH:mm')}">DATE</td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${appt.status == 'done'} ? ' status-completed' : (${appt.status == 'canceled'} ? ' status-rejected' : ' status-pending')"
                                  th:text="${appt.status}">pending</span>
                        </td>
                        <td class="text-center">
                            <div class="action-container">
                                <a th:href="@{/admin/appointments/{id}(id=${appt.id})}"
                                   class="btn-view" title="View Detail">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <a th:if="${appt.status == 'pending'}"
                                   th:href="@{/admin/appointments/{id}(id=${appt.id})}"
                                   class="btn-orange" title="Assign Staff">
                                    <i class="bi bi-person-plus-fill"></i>
                                    <span>Assign</span>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
