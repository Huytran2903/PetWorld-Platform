<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vaccination Record - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8f9fa; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-main-content { flex-grow: 1; padding: 2rem; height: 100vh; overflow-y: auto; }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='vaccination-records')}"></div>
    <div class="admin-main-content">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/vaccination-records}" class="text-secondary text-decoration-none fw-medium">
                <i class="bi bi-arrow-left"></i> Back to list
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-3 p-4 bg-white" style="max-width: 640px;">
            <h3 class="fw-bold text-dark mb-1">Edit Vaccination Record</h3>
            <p class="text-muted small mb-4">
                Use this form to correct administered date or next due date. Pet and vaccine information are read-only.
            </p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <dl class="row small mb-4">
                <dt class="col-sm-4 text-muted">Pet</dt>
                <dd class="col-sm-8 fw-semibold" th:text="${record.pet != null ? record.pet.name : '-'}">Pet</dd>
                <dt class="col-sm-4 text-muted">Vaccine</dt>
                <dd class="col-sm-8 fw-semibold" th:text="${record.vaccineName}">Vaccine</dd>
                <dt class="col-sm-4 text-muted">Record ID</dt>
                <dd class="col-sm-8" th:text="${record.vaccinationId}">#</dd>
            </dl>

            <form th:action="@{/admin/vaccination-records/{id}/edit(id=${record.vaccinationId})}" method="post">
                <div class="mb-3">
                    <label for="administeredDate" class="form-label fw-semibold">Administered Date</label>
                    <input type="date" class="form-control" id="administeredDate" name="administeredDate" required
                           th:value="${record.administeredDate}" />
                </div>
                <div class="mb-3">
                    <label for="nextDueDate" class="form-label fw-semibold">Next Due Date</label>
                    <input type="date" class="form-control" id="nextDueDate" name="nextDueDate"
                           th:value="${record.nextDueDate}" th:attr="min=${minNextDueDate}" />
                    <div class="form-text">Leave empty if this is a one-time vaccine.</div>
                </div>
                <div class="mb-4">
                    <label for="note" class="form-label fw-semibold">Note</label>
                    <textarea class="form-control" id="note" name="note" rows="3" maxlength="500"
                              th:text="${record.note != null ? record.note : ''}"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i> Save
                    </button>
                    <a th:href="@{/admin/vaccination-records}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
