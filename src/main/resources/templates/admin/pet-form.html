<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'add' ? 'Add New Pet' : 'Edit Pet'} + ' - Admin'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/pet-form.css}">
</head>
<body>

<div class="main-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="form-container px-3" style="width: 100%; max-width: 1000px;">
        <div class="mb-4 text-start ps-2">
            <h2 class="fw-bold text-dark mb-0" th:text="${formMode == 'add' ? 'Add New Pet' : 'Edit Pet'}"></h2>
            <p class="text-secondary small">Enter full details for the pet entry.</p>
        </div>

        <div class="card pet-card border-0 shadow-lg p-4">
            <form th:action="@{/admin/pet/save}" method="post">

                <!--                <input type="hidden" th:field="*{petID}">-->

                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-tag-fill me-1 text-warning"></i> Name <span
                                        class="text-danger">*</span>
                                </label>
                                <input type="text" name="name" class="form-control shadow-none" placeholder="e.g. LuLu"
                                       required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="fa-solid fa-dog text-warning me-1"></i> Breed
                                </label>
                                <input type="text" name="breed" class="form-control shadow-none"
                                       placeholder="e.g. Poodle">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-grid-fill me-1 text-warning"></i> Categories
                                </label>
                                <select class="form-select shadow-none" name="petType">
                                    <option value="Dog">Dog</option>
                                    <option value="Cat">Cat</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-gender-ambiguous me-1 text-warning"></i> Gender
                                </label>
                                <select class="form-select shadow-none" name="gender">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-calendar-event me-1 text-warning"></i> Age (Months)
                                </label>
                                <input type="number" min="0" class="form-control shadow-none" name="ageMonth">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-speedometer2 me-1 text-warning"></i> Weight (kg)
                                </label>
                                <input type="number" step="0.1" min="0" class="form-control shadow-none"
                                       name="weightKg">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-palette-fill me-1 text-warning"></i> Color
                                </label>
                                <input type="text" class="form-control shadow-none" name="color">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-cash-stack me-1 text-warning"></i> Price ($)
                                </label>
                                <input type="number" min="0" step="0.01" class="form-control shadow-none" name="price">
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="imageBase64" id="imageBase64">

                    <div class="upload-container border rounded-3 d-flex flex-column
        align-items-center justify-content-center bg-light p-4 text-center"
                         style="min-height: 320px;">

                        <!-- Preview -->
                        <div id="preview-box" class="mb-3" style="display:none">
                            <img id="img-preview"
                                 class="img-thumbnail shadow-sm"
                                 style="max-height: 200px; max-width: 100%; object-fit: contain;">
                        </div>

                        <!-- Placeholder -->
                        <div id="placeholder-box">
                            <i class="fa-solid fa-cloud-arrow-up fs-1 text-warning mb-3"></i>
                            <p class="small text-muted mb-3">
                                Click to upload or drag & drop pet image
                            </p>
                        </div>

                        <div class="custom-file-upload w-100">
                            <label for="file-upload"
                                   class="btn btn-outline-warning btn-sm px-4 shadow-sm">
                                Choose File
                            </label>

                            <input id="file-upload"
                                   type="file"
                                   accept="image/*"
                                   class="d-none"
                                   onchange="convertToBase64(this)">

                            <div id="file-name" class="small text-muted mt-2">
                                No file chosen
                            </div>
                        </div>
                    </div>


                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-percent me-1 text-warning"></i> Discount (%)
                        </label>
                        <input type="number" min="0" max="100" class="form-control shadow-none" name="discountPercent">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-info-circle-fill me-1 text-warning"></i> Availability
                        </label>
                        <select class="form-select shadow-none fw-bold" name="isAvailable">
                            <option value="true">Available</option>
                            <option value="false">Sold Out</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-chat-left-text-fill me-1 text-warning"></i> Description
                        </label>
                        <textarea class="form-control shadow-none" rows="3" placeholder="Friendly and well-trained."
                                  name="description"></textarea>
                    </div>

                    <div class="col-md-12 border-top pt-4 mt-4 d-flex gap-3 justify-content-end">
                        <a th:href="@{/admin/manage-pet}" class="btn btn-secondary px-4 py-2">Cancel</a>
                        <button type="submit" class="btn btn-warning px-5 py-2 shadow-sm text-white fw-bold">
                            Save Pet
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>

    function convertToBase64(input) {
        const preview = document.getElementById("img-preview");
        const previewBox = document.getElementById("preview-box");
        const placeholder = document.getElementById("placeholder-box");
        const fileName = document.getElementById("file-name");

        if (!input.files || !input.files[0]) return;

        const file = input.files[0];
        fileName.textContent = file.name;

        const reader = new FileReader();
        reader.onload = function (e) {
            // Set preview
            preview.src = e.target.result;
            previewBox.style.display = "block";
            placeholder.style.display = "none";

            // Save Base64 to hidden input
            document.getElementById("imageBase64").value = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
