<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Pet - Professional Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/pet-form.css}">
</head>
<body>

<div class="main-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="form-container px-3">
        <div class="mb-4 text-start ps-2">
            <h2 class="fw-bold text-dark mb-0">Add New Pet</h2>
            <p class="text-secondary small">Enter full details for the new pet entry.</p>
        </div>

        <div class="card pet-card border-0 shadow-lg p-4">
            <form th:action="@{/admin/pets/save}" method="POST" enctype="multipart/form-data">
                <div class="row g-4">

                    <div class="col-lg-7">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-tag-fill me-1 text-warning"></i> Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control shadow-none" placeholder="e.g. LuLu" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="fa-solid fa-dog text-warning me-1"></i> Breed
                                </label>
                                <input type="text" class="form-control shadow-none" placeholder="e.g. Poodle">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-grid-fill me-1 text-warning"></i> Categories
                                </label>
                                <select class="form-select shadow-none">
                                    <option value="Dog" selected>Dog</option>
                                    <option value="Cat">Cat</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-gender-ambiguous me-1 text-warning"></i> Gender
                                </label>
                                <select class="form-select shadow-none">
                                    <option value="Male" selected>Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-calendar-event me-1 text-warning"></i> Age (Years)
                                </label>
                                <input type="number" class="form-control shadow-none" placeholder="2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-speedometer2 me-1 text-warning"></i> Weight (kg)
                                </label>
                                <input type="number" step="0.1" class="form-control shadow-none" placeholder="4.5">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-palette-fill me-1 text-warning"></i> Color
                                </label>
                                <input type="text" class="form-control shadow-none" placeholder="Brown">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-cash-stack me-1 text-warning"></i> Price ($)
                                </label>
                                <input type="number" class="form-control shadow-none" placeholder="500">
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-image me-1 text-warning"></i> Pet Image
                        </label>
                        <div class="upload-container border border-dashed rounded-3 d-flex flex-column align-items-center justify-content-center bg-light p-4 text-center h-100" style="min-height: 280px;">
                            <i class="fa-solid fa-cloud-arrow-up fs-1 text-warning mb-3"></i>
                            <p class="small text-muted mb-3">Click to upload or drag & drop pet image</p>

                            <div class="custom-file-upload w-100">
                                <label for="file-upload" class="btn btn-outline-warning btn-sm px-4 shadow-sm">
                                    Choose File
                                </label>
                                <input id="file-upload" type="file" class="d-none" accept="image/*" onchange="updatePetFileName(this)">
                                <div id="file-name" class="small text-muted mt-2">No file chosen</div>
                            </div>

                            <div class="mt-3 d-none" id="preview-box">
                                <img src="" id="img-preview" class="img-fluid rounded shadow-sm" style="max-height: 120px;">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-percent me-1 text-warning"></i> Discount (%)
                        </label>
                        <input type="number" class="form-control shadow-none" value="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-info-circle-fill me-1 text-warning"></i> Status
                        </label>
                        <select class="form-select shadow-none text-success fw-bold">
                            <option value="Available" selected>Available</option>
                            <option value="Sold">Sold</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check form-switch p-2 border rounded bg-light shadow-sm w-100 mb-1 vax-switch">
                            <input class="form-check-input ms-0 me-3 shadow-none" type="checkbox" id="vaccineCheck" checked>
                            <label class="form-check-label fw-bold text-dark small" for="vaccineCheck">
                                <i class="bi bi-shield-check me-1 text-primary"></i> Vaccinated
                            </label>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-chat-left-text-fill me-1 text-warning"></i> Description
                        </label>
                        <textarea class="form-control shadow-none" rows="3" placeholder="Friendly and well-trained."></textarea>
                    </div>

                    <div class="col-md-12 border-top pt-4 mt-4 d-flex gap-3 justify-content-end">
                        <a th:href="@{'/admin/manage-pet'}" class="btn btn-pill-cancel px-4 py-2">Cancel</a>
                        <button type="submit" class="btn btn-save-pill px-5 py-2 shadow-sm text-white fw-bold">
                            Save Pet
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function updatePetFileName(input) {
        const fileNameDisplay = document.getElementById('file-name');
        const previewBox = document.getElementById('preview-box');
        const imgPreview = document.getElementById('img-preview');

        if (input.files && input.files.length > 0) {
            fileNameDisplay.innerText = input.files[0].name;
            const reader = new FileReader();
            reader.onload = function(e) {
                imgPreview.src = e.target.result;
                previewBox.classList.remove('d-none');
            }
            reader.readAsDataURL(input.files[0]);
        } else {
            fileNameDisplay.innerText = "No file chosen";
            previewBox.classList.add('d-none');
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
