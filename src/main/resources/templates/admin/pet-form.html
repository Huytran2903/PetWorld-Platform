<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'add' ? 'Add New Pet' : 'Edit Pet'} + ' - Admin'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/pet-form.css}">
</head>
<body>

<div class="main-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="form-container px-3" style="width: 100%; max-width: 1000px;">
        <div class="mb-4 text-start ps-2">
            <h2 class="fw-bold text-dark mb-0" th:text="${formMode == 'add' ? 'Add New Pet' : 'Edit Pet'}"></h2>
            <p class="text-secondary small">Enter full details for the pet entry.</p>
        </div>

        <div class="card pet-card border-0 shadow-lg p-4">
            <form th:action="@{/admin/pet/save}" method="post" enctype="multipart/form-data" th:object="${selectedPet}">

<!--                <input type="hidden" th:field="*{petID}">-->

                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-tag-fill me-1 text-warning"></i> Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{name}" class="form-control shadow-none" placeholder="e.g. LuLu" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="fa-solid fa-dog text-warning me-1"></i> Breed
                                </label>
                                <input type="text" th:field="*{breed}" class="form-control shadow-none" placeholder="e.g. Poodle">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-grid-fill me-1 text-warning"></i> Categories
                                </label>
                                <select class="form-select shadow-none" th:field="*{petType}">
                                    <option value="Dog">Dog</option>
                                    <option value="Cat">Cat</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-gender-ambiguous me-1 text-warning"></i> Gender
                                </label>
                                <select class="form-select shadow-none" th:field="*{gender}">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-calendar-event me-1 text-warning"></i> Age (Months)
                                </label>
                                <input type="number" min="0" class="form-control shadow-none" th:field="*{ageMonths}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-speedometer2 me-1 text-warning"></i> Weight (kg)
                                </label>
                                <input type="number" step="0.1" min="0" class="form-control shadow-none" th:field="*{weightKg}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-palette-fill me-1 text-warning"></i> Color
                                </label>
                                <input type="text" class="form-control shadow-none" th:field="*{color}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">
                                    <i class="bi bi-cash-stack me-1 text-warning"></i> Price ($)
                                </label>
                                <input type="number" min="0" step="0.01" class="form-control shadow-none" th:field="*{price}">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold text-secondary">
                            <i class="fa-regular fa-image me-1"></i> Pet Image
                        </label>

                        <div class="upload-container border border-dashed rounded-3 d-flex flex-column align-items-center justify-content-center bg-light p-4 text-center h-100"
                             style="min-height: 320px; position: relative;">

                            <div id="preview-box" class="mb-3"
                                 th:style="${selectedPet.imageUrl == null || selectedPet.imageUrl == ''} ? 'display: none;' : 'display: block;'">

                                <img th:src="@{${selectedPet.imageUrl != null ? '/pet-images/' + selectedPet.imageUrl : '#'}}"
                                     id="img-preview"
                                     class="img-thumbnail shadow-sm"
                                     style="max-height: 200px; max-width: 100%; object-fit: contain;">
                            </div>

                            <div id="placeholder-box"
                                 th:style="${selectedPet.imageUrl != null && selectedPet.imageUrl != ''} ? 'display: none;' : 'display: block;'">
                                <i class="fa-solid fa-cloud-arrow-up fs-1 text-warning mb-3"></i>
                                <p class="small text-muted mb-3">
                                    Click to upload or drag & drop pet image
                                </p>
                            </div>

                            <div class="custom-file-upload w-100">
                                <label for="file-upload" class="btn btn-outline-warning btn-sm px-4 shadow-sm" style="cursor: pointer;">
                                    Choose File
                                </label>

                                <input id="file-upload" type="file" name="imageFile" class="d-none" accept="image/*" onchange="previewImage(this)">

<!--                                <input type="hidden" th:field="*{imageUrl}">-->

                                <div id="file-name" class="small text-muted mt-2">
                                    <span th:text="${selectedPet.imageUrl != null} ? ${selectedPet.imageUrl} : 'No file chosen'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-percent me-1 text-warning"></i> Discount (%)
                        </label>
                        <input type="number" min="0" max="100" class="form-control shadow-none" th:field="*{discountPercent}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-info-circle-fill me-1 text-warning"></i> Availability
                        </label>
                        <select class="form-select shadow-none fw-bold" th:field="*{isAvailable}">
                            <option value="true">Available</option>
                            <option value="false">Sold Out</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-semibold text-secondary small">
                            <i class="bi bi-chat-left-text-fill me-1 text-warning"></i> Description
                        </label>
                        <textarea class="form-control shadow-none" rows="3" placeholder="Friendly and well-trained." th:field="*{description}"></textarea>
                    </div>

                    <div class="col-md-12 border-top pt-4 mt-4 d-flex gap-3 justify-content-end">
                        <a th:href="@{/admin/manage-pet}" class="btn btn-secondary px-4 py-2">Cancel</a>
                        <button type="submit" class="btn btn-warning px-5 py-2 shadow-sm text-white fw-bold">
                            Save Pet
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function previewImage(input) {
        var previewBox = document.getElementById('preview-box');
        var imgPreview = document.getElementById('img-preview');
        var placeholder = document.getElementById('placeholder-box'); // Đã sửa đúng ID
        var fileNameDisplay = document.getElementById('file-name');

        // QUAN TRỌNG: Tìm thẻ input ẩn chứa imageUrl
        // Lưu ý: ID của th:field="*{imageUrl}" thường là "imageUrl"
        var hiddenInput = document.getElementById('imageUrl');

        if (input.files && input.files[0]) {
            var file = input.files[0];
            fileNameDisplay.textContent = file.name;

            var reader = new FileReader();
            reader.onload = function(e) {
                // 1. Chỉ gán vào thẻ IMG để xem
                imgPreview.src = e.target.result;

                // 2. TUYỆT ĐỐI KHÔNG gán e.target.result vào hiddenInput
                // Nếu có dòng code nào gán value cho hiddenInput ở đây -> XÓA NGAY

                // 3. (Mẹo) Có thể xóa giá trị cũ của input ẩn đi để tránh gửi nhầm
                if(hiddenInput) hiddenInput.value = "";

                previewBox.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
