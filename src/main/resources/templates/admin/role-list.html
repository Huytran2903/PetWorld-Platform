<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/role-list.css}">
</head>
<body class="bg-light pt-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:if="${param.error[0] == 'RoleNotFound'}">Role not found! Please select a valid role.</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm"
                 role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-theme py-3 d-flex justify-content-between align-items-center rounded-top-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>Role Management</h5>
                    <button class="btn btn-light btn-sm fw-bold text-dark">
                        <i class="bi bi-plus-lg me-1"></i> Add New Role
                    </button>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th scope="col" class="ps-4 py-3">ID</th>
                                <th scope="col" class="py-3">Role Name</th>
                                <th scope="col" class="text-end pe-4 py-3">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="role : ${roles}">
                                <td class="ps-4 fw-bold text-muted" th:text="${role.roleId}">1</td>
                                <td>
                                    <span class="badge role-badge" th:text="${role.roleName}">ADMIN</span>
                                </td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/admin/roles/permissions/{id}(id=${role.roleId})}"
                                       class="btn btn-outline-theme btn-sm fw-bold px-3 py-2">
                                        <i class="bi bi-key-fill me-1"></i> Manage Permissions
                                    </a>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(roles)}">
                                <td colspan="3" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                    No roles found in the database.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/role-list.js}"></script>

</body>
</html>
