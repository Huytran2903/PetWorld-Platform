<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Categories Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/manageCategories.css" />
</head>
<body>
<div class="app-container">
  <header class="page-header py-4 shadow-sm mb-4">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
      <div>
        <h1 class="h3 mb-1 fw-bold text-dark">Categories Management System</h1>
      </div>
      <a th:href="@{/admin/category/new}" class="btn btn-add-new d-flex align-items-center gap-2 px-4 py-2 shadow-sm">
        <span class="fs-4">+</span> Add New Categories
      </a>
    </div>
  </header>

  <main class="container-fluid px-4">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-header bg-white py-3 border-0">
        <div class="row g-3 align-items-center">
          <div class="col-md-4">
            <div class="search-box position-relative">
              <input type="text" class="form-control rounded-pill ps-5" placeholder="Search category by name...">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted">🔍</span>
            </div>
          </div>
          <div class="col-md-2">
            <select class="form-select rounded-pill">
              <option selected>Categories</option>
              <option>Food</option>
              <option>Vitamin</option>
            </select>
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light text-uppercase small fw-bold">
          <tr>
            <th class="ps-4">Categories Id</th>
            <th>Categories Name</th>
            <th>Description</th>
            <th class="text-end pe-4">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="x : ${categories}">
            <td class="ps-4 fw-bold" th:text="${x.categoryID}"></td>
            <td>
              <div class="fw-bold text-dark" th:text="${x.name}"></div>
            </td>
            <td th:text="${x.description}"></td>
            <td class="text-end pe-4">
              <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                <a th:href="@{'/admin/category/edit/' + ${x.categoryID}}" class="btn btn-sm btn-outline-secondary border-0 px-3">Edit</a>

                <button type="button" class="btn btn-sm btn-outline-danger border-0 px-3"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteCategoryModal"
                        th:data-action="@{/admin/category/delete/{id}(id=${x.categoryID})}"
                        th:data-name="${x.name}"
                        th:data-has-products="${not #lists.isEmpty(x.productList)}">
                  Delete
                </button>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="deleteCategoryModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-bottom-0">
        <h5 class="modal-title fw-bold" id="deleteModalTitle">Confirm Deletion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body py-4 text-center">
        <div class="mb-3">
          <i id="deleteModalIcon" class="bi display-1"></i>
        </div>
        <p class="mb-1 text-secondary" id="deleteModalMessage"></p>
        <p class="fw-bold fs-5 text-dark" id="categoryNamePlaceholder"></p>
        <p class="small text-muted" id="deleteModalSubMessage"></p>
      </div>
      <div class="modal-footer border-top-0 justify-content-center pb-4">
        <button type="button" id="cancelBtn" class="btn px-4 rounded-pill" data-bs-dismiss="modal">
          Cancel
        </button>
        <a id="confirmDeleteBtn" href="#" class="btn btn-danger px-4 rounded-pill">
          <i class="bi bi-trash3-fill me-2"></i> Yes, Delete
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const deleteCatModal = document.getElementById('deleteCategoryModal');

    if (deleteCatModal) {
      deleteCatModal.addEventListener('show.bs.modal', event => {
        const button = event.relatedTarget;

        // Lấy dữ liệu từ nút bấm
        const deleteUrl = button.getAttribute('data-action');
        const categoryName = button.getAttribute('data-name');
        const hasProducts = button.getAttribute('data-has-products') === 'true';

        // Lấy các thẻ HTML trong Modal
        const confirmBtn = document.getElementById('confirmDeleteBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const title = document.getElementById('deleteModalTitle');
        const icon = document.getElementById('deleteModalIcon');
        const message = document.getElementById('deleteModalMessage');
        const subMessage = document.getElementById('deleteModalSubMessage');
        const namePlaceholder = document.getElementById('categoryNamePlaceholder');

        // Set tên danh mục
        namePlaceholder.textContent = categoryName ? '"' + categoryName + '"' : '';

        if (hasProducts) {
          // CÓ SẢN PHẨM -> KHÔNG CHO XÓA
          title.textContent = "Cannot Delete Category";
          title.className = "modal-title fw-bold text-warning";

          icon.className = "bi bi-exclamation-triangle text-warning display-1";

          message.textContent = "This category contains products.";
          subMessage.textContent = "Please delete or move the products before deleting this category.";

          confirmBtn.style.display = 'none'; // Ẩn nút Delete

          cancelBtn.textContent = "Close";
          cancelBtn.className = "btn btn-secondary px-4 rounded-pill";
        } else {
          // TRỐNG SẢN PHẨM -> CHO PHÉP XÓA
          title.textContent = "Confirm Deletion";
          title.className = "modal-title fw-bold text-danger";

          icon.className = "bi bi-exclamation-circle text-danger display-1";

          message.textContent = "Are you sure you want to delete this category?";
          subMessage.textContent = "This action cannot be undone.";

          confirmBtn.style.display = 'inline-flex'; // Hiện nút Delete
          confirmBtn.href = deleteUrl;

          cancelBtn.textContent = "Cancel";
          cancelBtn.className = "btn btn-light px-4 rounded-pill border";
        }
      });
    }
  });
</script>
</body>
</html>
