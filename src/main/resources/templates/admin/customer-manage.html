<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/customer-manage.css}"/>
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

</head>
<body class="bg-white">
<div class="d-flex">â
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='customers')}"></div>


    <div class="container-fluid py-4 px-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Customer Management</h2>
            <div class="d-flex gap-3 align-items-center">
                <div class="input-group search-box">
                    <span class="input-group-text bg-white border-end-0"><i
                            class="fas fa-search text-warning"></i></span>
                    <input type="text" class="form-control border-start-0" placeholder="Search customer...">
                </div>
                <button class="btn btn-add px-4 py-2 fw-bold text-white shadow-sm">
                    + Add Customer
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 15px;">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr class="text-dark">
                    <th class="ps-4">Customer</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Joined Date</th>
                    <th>Status</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr class="border-bottom">
                    <td class="ps-4">
                        <div class="avatar-circle bg-primary-subtle text-primary">JD</div>
                    </td>
                    <td class="fw-bold">John Doe</td>
                    <td>john.doe@gmail.com</td>
                    <td>+84 9876543210</td>
                    <td>13-Jan-2026</td>
                    <td>
                        <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3 py-2">Active</span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center align-items-center gap-2">
                            <button class="btn btn-orange-pill text-white btn-sm px-3">Edit</button>
                            <a href="#" class="text-danger mx-1" title="Delete"><i class="far fa-trash-alt"></i></a>
                        </div>
                    </td>
                </tr>
                <tr class="bg-orange-light">
                    <td class="ps-4">
                        <div class="avatar-circle bg-danger-subtle text-danger">SW</div>
                    </td>
                    <td class="fw-bold">Sarah Williams</td>
                    <td>sarah.w@gmail.com</td>
                    <td>+84 912345678</td>
                    <td>20-Jan-2026</td>
                    <td>
                        <span class="badge rounded-pill bg-secondary-subtle text-secondary border border-secondary-subtle px-3 py-2">Inactive</span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center align-items-center gap-2">
                            <button class="btn btn-orange-pill text-white btn-sm px-3">Edit</button>
                            <a href="#" class="text-danger mx-1"><i class="far fa-trash-alt"></i></a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
