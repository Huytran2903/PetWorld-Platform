<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Records - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8f9fa; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-main-content { flex-grow: 1; padding: 2rem; height: 100vh; overflow-y: auto; }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='vaccination-records')}"></div>
    <div class="admin-main-content">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/service-manager}" class="text-secondary text-decoration-none fw-medium">
                <i class="bi bi-arrow-left"></i> Back to Service Manager
            </a>
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 bg-white p-3 shadow-sm rounded-3">
            <h3 class="fw-bold text-dark mb-0">Vaccination Records</h3>
            <span class="text-muted small">

            </span>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="text-uppercase small fw-bold" style="background-color: #f1f5f9; color: #64748b;">
                    <tr>
                        <th class="ps-4 py-3">Pet</th>
                        <th class="py-3">Owner</th>
                        <th class="py-3">Vaccine</th>
                        <th class="py-3">Administered</th>
                        <th class="py-3">Next due</th>
                        <th class="py-3">Performed by</th>
                        <th class="py-3 pe-4 text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${vaccinationRows}" class="border-bottom">
                        <td class="ps-4">
                            <div class="fw-bold text-dark" th:text="${row.petName}">Pet</div>
                            <div class="text-muted small" th:text="${row.petId != null ? ('#' + row.petId) : ''}">#</div>
                        </td>
                        <td th:text="${row.ownerName != null ? row.ownerName : '-'}">-</td>
                        <td th:text="${row.vaccineName}">Vaccine</td>
                        <td th:text="${row.administeredDate != null ? row.administeredDate : '-'}">-</td>
                        <td>
                            <span th:if="${row.nextDueDate != null}"
                                  class="badge bg-warning-subtle text-warning border border-warning px-3 py-2 rounded-pill"
                                  th:text="${row.nextDueDate}">-</span>
                            <span th:unless="${row.nextDueDate != null}"
                                  class="badge bg-secondary-subtle text-secondary border border-secondary px-3 py-2 rounded-pill">
                                None
                            </span>
                        </td>
                        <td th:text="${row.performedByName != null ? row.performedByName : '-'}">-</td>
                        <td class="pe-4 text-end">
                            <a th:if="${row.vaccinationId != null}"
                               th:href="@{/admin/vaccination-records/{id}/edit(id=${row.vaccinationId})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil-square me-1"></i> Edit
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${vaccinationRows == null || #lists.isEmpty(vaccinationRows)}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2 text-light"></i>
                            No vaccination records found.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
