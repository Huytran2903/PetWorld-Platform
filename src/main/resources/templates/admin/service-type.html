<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Service Types - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-service.css}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Admin</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4 px-4">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/service-manager}" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Service Manager</a>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}">Saved.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">Error.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">Service Types</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#serviceTypeModal" id="btnAddNew">
                <i class="bi bi-plus-lg me-1"></i> Add New Type
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-uppercase small fw-bold">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="st, iterStat : ${serviceTypes}">
                            <td class="ps-4 fw-bold" th:text="${st.id}">1</td>
                            <td><span class="fw-bold text-dark" th:text="${st.name}">—</span></td>
                            <td><span class="text-muted" th:text="${st.description != null ? st.description : '-'}">—</span></td>
                            <td>
                                <span th:if="${st.isActive}" class="badge bg-success">Active</span>
                                <span th:unless="${st.isActive}" class="badge bg-secondary">Inactive</span>
                            </td>
                            <td class="text-end pe-4">
                                <a th:href="@{/admin/service-type(editId=${st.id})}" class="btn btn-sm btn-outline-primary me-1" role="button">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <th:block th:if="${st.isActive}">
                                    <form th:action="@{/admin/service-type/delete/{id}(id=${st.id})}" method="post" class="d-inline" th:data-name="${st.name}" onsubmit="return confirm('Delete this service type? If it is currently in use, the system will deactivate it instead of deleting permanently.');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Delete</button>
                                    </form>
                                </th:block>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(serviceTypes)}">
                            <td colspan="5" class="text-center text-muted py-4">No service types yet. Click "Add New Type" to create one.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal: Add / Edit Service Type -->
    <div class="modal fade" id="serviceTypeModal" tabindex="-1" aria-labelledby="serviceTypeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="serviceTypeModalLabel" th:text="${serviceType.id != null} ? 'Edit Service Type' : 'Add New Type'">Add New Type</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/service-type/save}" method="post" th:object="${serviceType}">
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}" id="formId" />
                        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger py-2">
                            <ul class="mb-0 list-unstyled small">
                                <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Error</li>
                            </ul>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. Grooming, Spa, Vaccination" required maxlength="80" />
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1" th:errors="*{name}">Name error</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Brief description of this service type." maxlength="500"></textarea>
                        </div>
                        <div class="mb-0">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" th:field="*{isActive}" id="formActive" />
                                <label class="form-check-label fw-semibold" for="formActive">Active</label>
                            </div>
                            <div class="form-text">Inactive types are hidden from new bookings.</div>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        (function() {
            const modal = document.getElementById('serviceTypeModal');
            if (!modal) return;
            const openModal = /*[[${openModal}]]*/ false;
            if (openModal) {
                new bootstrap.Modal(modal).show();
            }
            document.getElementById('btnAddNew').addEventListener('click', function() {
                document.getElementById('serviceTypeModalLabel').textContent = 'Add New Type';
                var fid = document.getElementById('formId'); if (fid) fid.value = '';
                var ni = modal.querySelector('input[name="name"]'); if (ni) ni.value = '';
                var di = modal.querySelector('textarea[name="description"]'); if (di) di.value = '';
                var activeCheck = document.getElementById('formActive'); if (activeCheck) activeCheck.checked = true;
            });
        })();
    </script>
</body>
</html>
