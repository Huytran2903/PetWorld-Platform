<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Configuration - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-config.css}">
</head>
<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold text-dark">
            <i class="fas fa-plus-circle text-primary me-2"></i>Add New Configuration
        </h2>
        <a th:href="@{/admin/config}" class="btn btn-outline-secondary shadow-sm bg-white">
            <i class="fas fa-arrow-left me-1"></i> Back to List
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-12 mb-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4 p-md-5">

                    <form th:action="@{/admin/config/add}" th:object="${newConfig}" method="post">

                        <div class="mb-4">
                            <label for="configKey" class="form-label fw-bold text-dark">
                                Config Key <span class="text-danger">*</span>
                            </label>
                            <select class="form-select form-select-lg fs-6" id="configKey" th:field="*{configKey}"
                                    required>
                                <option value="" disabled selected>-- Select a predefined Configuration Key --</option>

                                <optgroup label="Hero & Banners">
                                    <option value="DISCOUNT_BANNER">DISCOUNT_BANNER (Sale / Discount Banner Text)
                                    </option>
                                    <option value="HERO_TITLE">HERO_TITLE (Main Hero Title Text)</option>
                                </optgroup>

                                <optgroup label="Shop Information">
                                    <option value="SHOP_ADDRESS">SHOP_ADDRESS (Shop Address)</option>
                                    <option value="SHOP_EMAIL">SHOP_EMAIL (Contact Email)</option>
                                    <option value="SHOP_PHONE">SHOP_PHONE (Hotline / Phone Number)</option>
                                </optgroup>

                                <optgroup label="About Us Page">
                                    <option value="ABOUT_SUBTITLE">ABOUT_SUBTITLE (About Us Subtitle)</option>
                                    <option value="ABOUT_STORY">ABOUT_STORY (Our Story Content)</option>
                                    <option value="ABOUT_MISSION">ABOUT_MISSION (Our Mission Content)</option>
                                    <option value="VALUE_CARE_DESC">VALUE_CARE_DESC (Expert Care Description)</option>
                                    <option value="VALUE_FACILITY_DESC">VALUE_FACILITY_DESC (Modern Facilities
                                        Description)
                                    </option>
                                    <option value="VALUE_LOVE_DESC">VALUE_LOVE_DESC (Loving Environment Description)
                                    </option>
                                </optgroup>

                                <optgroup label="FAQs (Frequently Asked Questions)">
                                    <option value="FAQ_Q1">FAQ_Q1 (Question 1)</option>
                                    <option value="FAQ_A1">FAQ_A1 (Answer 1)</option>
                                    <option value="FAQ_Q2">FAQ_Q2 (Question 2)</option>
                                    <option value="FAQ_A2">FAQ_A2 (Answer 2)</option>
                                    <option value="FAQ_Q3">FAQ_Q3 (Question 3)</option>
                                    <option value="FAQ_A3">FAQ_A3 (Answer 3)</option>
                                </optgroup>

                                <optgroup label="Slogans & Texts">
                                    <option value="SLOGAN_MAIN">SLOGAN_MAIN (Main Slogan)</option>
                                    <option value="SLOGAN_SUB">SLOGAN_SUB (Sub Slogan)</option>
                                    <option value="FOOTER_COPYRIGHT">FOOTER_COPYRIGHT (Footer Copyright Text)</option>
                                </optgroup>

                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="configValue" class="form-label fw-bold text-dark">
                                Config Value <span class="text-danger">*</span>
                            </label>
                            <textarea class="form-control fs-6" id="configValue" th:field="*{configValue}"
                                      rows="4"
                                      placeholder="Enter the display value here (HTML tags like <br> or <b> are allowed for texts)..."
                                      required></textarea>
                        </div>

                        <input type="hidden" name="dataType" value="STRING"/>

                        <div class="d-flex justify-content-end border-top pt-4">
                            <button type="reset" class="btn btn-light border px-4 me-3">Clear Form</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                <i class="fas fa-save me-1"></i> Save Configuration
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin-config.js}"></script>
</body>
</html>
