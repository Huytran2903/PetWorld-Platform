<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Staff Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<main class="staff-edit-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="card-custom">

                    <div class="card-header-custom">
                        <h2>Staff</h2>
                        <p>Manage staff information and role</p>
                    </div>

                    <div class="card-body p-4 pt-0">

                        <div class="avatar-section">
                            <div class="avatar-circle">
                            </div>
                        </div>

                        <form action="#" method="POST"> <div class="row g-4">

                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" value="Nguyen Van A">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">User Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" class="form-control" value="A@123">
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" value="A.2842@example.com">
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control" value="(+84)0751546756">
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Role</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                                    <select class="form-select">
                                        <option selected>Select Role</option>
                                        <option value="1">Admin</option>
                                        <option value="2">Staff</option>
                                        <option value="3">Manager</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-12 mt-5 d-flex justify-content-center gap-4">
                                <button type="submit" class="btn-save">Save</button>

                                <a href="/profile" class="btn-cancel">Cancel</a>
                            </div>

                        </div>
                        </form>
                    </div> </div> </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
