<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/layout-public :: layout(~{::content}, ~{::headExtras}, ~{::pageScripts})}"
      th:with="activePage='shop-products', pageTitle='Product Detail'">
<th:block th:fragment="headExtras">
    <link rel="stylesheet" th:href="@{/css/product-detail.css}"/>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</th:block>
<div th:fragment="content" class="product-page-body">

<main class="product-card-container">
    <div class="row g-0">

        <div class="col-lg-5 col-md-12">
            <div class="image-section-wrapper">
                <a th:href="@{'/products'}" class="back-button">
                    <i class="bi bi-arrow-left"></i>
                    <span>back to list</span>
                </a>
                <img th:src="${proDetail.imageUrl}" alt="Product Image" class="main-product-image">
            </div>
        </div>

        <div class="col-lg-7 col-md-12 content-section-wrapper">
            <article class="product-info-article">
                <header class="product-header">
                    <h1 class="display-5 fw-bold" th:text="${proDetail.name}">Product Name</h1>
                </header>

                <section class="description-box mt-4">
                    <h6 class="fw-bold text-dark text-uppercase">Description:</h6>
                    <p class="text-secondary description-text" th:text="${proDetail.description}">
                        Product description goes here...
                    </p>
                </section>

                <div class="thumbnail-preview my-4">
                    <img class="img-thumb active" th:src="${proDetail.imageUrl}" alt="Thumbnail"/>
                </div>

                <div class="price-details-stack">
                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-box-seam" style="color: #28c76f;"></i></div>
                        <span class="label-text">Stock:</span>
                        <span class="value-text text-dark" th:text="${proDetail.stock}">6</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-tags-fill" style="color: #ff9f43;"></i></div>
                        <span class="label-text">Price:</span>

                        <div th:if="${proDetail.discountPercent != null and proDetail.discountPercent > 0}"
                             class="ms-2">
                            <span class="value-text price-color fw-bold"
                                  th:text="${#numbers.formatDecimal(proDetail.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            <del class="text-muted small ms-2"
                                 th:text="${#numbers.formatDecimal(proDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></del>
                        </div>
                        <span th:unless="${proDetail.discountPercent != null and proDetail.discountPercent > 0}"
                              class="ms-2 value-text price-color"
                              th:text="${#numbers.formatDecimal(proDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-percent" style="color: #ea5455;"></i></div>
                        <span class="label-text">Sale:</span>
                        <span class="ms-2 badge badge-sale-custom"
                              th:text="${proDetail.discountPercent != null ? proDetail.discountPercent + '%' : '0%'}">0%</span>
                    </div>
                </div>

                <div class="integrated-action-bar mt-4">
                    <div class="d-flex align-items-center flex-wrap gap-3">
                        <div class="quantity-selector d-flex align-items-center">
                            <label class="fw-bold text-muted me-3 mb-0">Qty:</label>
                            <div class="d-flex align-items-center">
                                <button type="button" class="btn-qty" onclick="changeQty(-1)">-</button>
                                <input type="number" id="quantityInput" class="input-qty text-center mx-1"
                                       value="1" min="1" th:max="${proDetail.stock}" readonly
                                       style="width: 50px; border: 1px solid #ddd; border-radius: 5px;"/>
                                <button type="button" class="btn-qty" onclick="changeQty(1)">+</button>
                            </div>
                        </div>

                        <button type="button"
                                class="btn-add-to-cart btn btn-dark px-4 py-2"
                                style="border-radius: 50px;"
                                th:onclick="|addToCartWithQty(${proDetail.productId})|">
                            <i class="bi bi-cart-plus me-2"></i> ADD TO CART
                        </button>
                    </div>

                    <div id="stockWarning" class="text-danger small mt-2 fw-bold"
                         style="display: none; animation: fadeIn 0.3s ease-in-out;">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                        Sorry, only <span th:text="${proDetail.stock}"></span> items left in stock!
                    </div>
                </div>
            </article>
        </div>

    </div>
</main>
</div>
<th:block th:fragment="pageScripts">
<script>
    let warningTimeout;

    function changeQty(change) {
        let input = document.getElementById('quantityInput');
        let warning = document.getElementById('stockWarning');

        let currentVal = parseInt(input.value) || 1;
        let maxStock = parseInt(input.getAttribute('max')) || 1;

        let newVal = currentVal + change;

        if (newVal < 1) {
            newVal = 1;
        } else if (newVal > maxStock) {
            newVal = maxStock;

            if (warning) {
                warning.style.display = 'block';

                clearTimeout(warningTimeout);

                warningTimeout = setTimeout(function () {
                    warning.style.display = 'none';
                }, 3000);
            }
        } else {
            if (warning) {
                warning.style.display = 'none';
            }
        }

        input.value = newVal;
    }
    function addToCartWithQty(productId) {
        let qty = document.getElementById('quantityInput').value;

        window.location.href = '/cart/add-product/' + productId + '?qty=' + qty;
    }
</script>
</th:block>
</html>
