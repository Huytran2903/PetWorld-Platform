<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, headExtras, pageScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(pageTitle != null and !#strings.isEmpty(pageTitle)) ? pageTitle : 'PetWorld Platform'}">PetWorld Platform</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Keep Bootstrap container widths consistent with homepage when Tailwind is loaded. */
        body.pw-layout .container {
            width: 100%;
            padding-right: calc(var(--bs-gutter-x, 1.5rem) * 0.5);
            padding-left: calc(var(--bs-gutter-x, 1.5rem) * 0.5);
            margin-right: auto;
            margin-left: auto;
            max-width: none;
        }

        @media (min-width: 576px) {
            body.pw-layout .container {
                max-width: 540px;
            }
        }

        @media (min-width: 768px) {
            body.pw-layout .container {
                max-width: 720px;
            }
        }

        @media (min-width: 992px) {
            body.pw-layout .container {
                max-width: 960px;
            }
        }

        @media (min-width: 1200px) {
            body.pw-layout .container {
                max-width: 1140px;
            }
        }

        @media (min-width: 1400px) {
            body.pw-layout .container {
                max-width: 1320px;
            }
        }

        a {
            text-decoration: none;
        }
    </style>
    <th:block th:replace="${headExtras}"></th:block>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen pw-layout">

<div th:replace="~{fragments/header-customer :: header(activePage=${activePage != null ? activePage : ''})}"></div>

<div class="flex-grow d-flex flex-column min-w-0">
    <th:block th:replace="${content}"></th:block>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${pageScripts}"></th:block>

<th:block th:fragment="empty"></th:block>
</body>
</html>
