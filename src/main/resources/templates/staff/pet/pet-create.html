<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Pet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">
    <script th:src="@{/js/pet-dashboard.js}"></script>
</head>
<body class="bg-gray-50">

<div class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto fade-in">
        <a th:href="@{/staff/pet/list}" class="inline-flex items-center gap-2 text-gray-500 hover:text-orange-600 mb-6 font-medium transition">
            <i class="fa-solid fa-arrow-left"></i> Back to Pet List
        </a>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-orange-500 to-red-500 p-8 text-white">
                <h2 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-circle-plus"></i> Create New Profile
                </h2>
                <p class="mt-2 text-orange-100 opacity-90">Add a new pet to the system for service or sale.</p>
            </div>

            <form th:action="@{/staff/pet/create}" th:object="${petDTO}" method="post" class="p-8 md:p-10">

                <div class="mb-8 p-5 bg-orange-50 rounded-xl border border-orange-100">
                    <label class="block text-sm font-bold text-gray-800 mb-4 uppercase tracking-wide">Select Profile Type</label>
                    <div class="flex gap-8">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center w-6 h-6">
                                <input type="radio" th:field="*{createPetOwnerType}" value="customer" class="peer appearance-none w-full h-full border-2 border-gray-300 rounded-full checked:border-orange-500 checked:bg-orange-500 transition" checked onchange="toggleCreatePetType()">
                                <div class="absolute w-2 h-2 bg-white rounded-full opacity-0 peer-checked:opacity-100"></div>
                            </div>
                            <span class="font-bold text-gray-700 group-hover:text-orange-600 transition">Customer's Pet</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center w-6 h-6">
                                <input type="radio" th:field="*{createPetOwnerType}" value="shop" class="peer appearance-none w-full h-full border-2 border-gray-300 rounded-full checked:border-orange-500 checked:bg-orange-500 transition" onchange="toggleCreatePetType()">
                                <div class="absolute w-2 h-2 bg-white rounded-full opacity-0 peer-checked:opacity-100"></div>
                            </div>
                            <span class="font-bold text-gray-700 group-hover:text-orange-600 transition">Shop's Pet (For Sale)</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Pet Name <span class="text-red-500">*</span></label>
                            <input type="text" th:field="*{name}" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition bg-gray-50 focus:bg-white" placeholder="e.g. LuLu">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Species</label>
                                <div class="relative">
                                    <select th:field="*{species}" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 appearance-none bg-gray-50">
                                        <option value="dog">Dog 🐕</option>
                                        <option value="cat">Cat 🐈</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Breed</label>
                                <input type="text" th:field="*{breed}" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50" placeholder="e.g. Corgi">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Age (Months)</label>
                            <input type="number" th:field="*{age}" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div id="create-field-owner" class="transition-all duration-300">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Owner Customer ID <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <input type="number" th:field="*{ownerId}" class="w-full px-4 py-3 pl-11 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50" placeholder="Search or enter ID...">
                                <i class="fa-solid fa-user absolute left-4 top-4 text-gray-400"></i>
                            </div>
                            <p class="text-xs text-gray-500 mt-1 ml-1">Link this pet to an existing customer account.</p>
                        </div>

                        <div id="create-field-price" class="hidden transition-all duration-300">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Sale Price (VND)</label>
                            <div class="relative">
                                <input type="number" th:field="*{price}" class="w-full px-4 py-3 pl-11 border border-green-200 bg-green-50 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 font-bold text-green-700" placeholder="0">
                                <i class="fa-solid fa-tag absolute left-4 top-4 text-green-600"></i>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Image URL</label>
                            <div class="relative">
                                <input type="text" th:field="*{imageUrl}" class="w-full px-4 py-3 pl-11 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50" placeholder="https://...">
                                <i class="fa-solid fa-image absolute left-4 top-4 text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description / Notes</label>
                    <textarea th:field="*{description}" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 h-24 bg-gray-50 resize-none"></textarea>
                </div>

                <div class="mt-10 flex justify-end gap-4 border-t border-gray-100 pt-6">
                    <a th:href="@{/staff/pet/list}" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 font-semibold transition">Cancel</a>
                    <button type="submit" class="px-8 py-3 rounded-lg bg-orange-500 text-white hover:bg-orange-600 shadow-lg hover:shadow-orange-200 font-bold transition transform active:scale-95">Create Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
