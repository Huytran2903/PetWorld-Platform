<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout_staff :: layout(~{::content})}">
<section th:fragment="content">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">
    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="flex h-screen overflow-hidden font-sans antialiased text-gray-700">
        <aside class="w-64 bg-white shadow-xl flex flex-col z-10 hidden md:flex border-r border-gray-100">
            <div class="p-6 flex items-center gap-3 border-b border-gray-100">
                <i class="fa-solid fa-paw text-3xl text-primary"></i>
                <span class="text-2xl font-extrabold text-gray-800"><span class="text-secondary">Petworld Platform</span></span>
            </div>
            <nav class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1">
                     <li><a th:href="@{/staff/pet/list}" class="sidebar-link active flex items-center gap-3 px-6 py-3 transition-colors hover:bg-gray-50 text-gray-600"><i class="fa-solid fa-dog w-5 text-center"></i><span class="font-semibold">Pet List</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col h-screen overflow-hidden bg-bgLight">
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 relative">
                <section class="fade-in">
                    <div class="max-w-4xl mx-auto">
                        <a th:href="@{/staff/pet/detail}" class="mb-4 text-gray-500 hover:text-primary flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Back to Detail</a>
                        
                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
                            <div class="bg-gradient-to-r from-primary to-primaryHover p-6">
                                <h2 class="text-2xl font-bold text-white"><i class="fa-solid fa-pen-to-square mr-2"></i> Update Pet Profile</h2>
                                <p class="mt-1 text-white text-sm font-medium">Edit details of an existing pet profile (Ref: Item 18 - 2.2.docx)</p>
                            </div>
                            
                            <form class="p-8">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div class="space-y-6">
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Pet Name <span class="text-red-500">*</span></label><input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="LuLu"></div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div><label class="block text-sm font-semibold text-gray-700 mb-2">Species</label><select class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none"><option value="dog" selected>Dog</option><option value="cat">Cat</option></select></div>
                                            <div><label class="block text-sm font-semibold text-gray-700 mb-2">Breed</label><input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="Corgi"></div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div><label class="block text-sm font-semibold text-gray-700 mb-2">Age (Months)</label><input type="number" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="24"></div>
                                            <div><label class="block text-sm font-semibold text-gray-700 mb-2">Weight (Kg)</label><input type="number" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="12.0"></div>
                                        </div>
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Color</label><input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="White Gold"></div>
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Gender</label><div class="flex gap-4"><label class="flex items-center gap-2"><input type="radio" name="updateGender" class="text-primary"> Male</label><label class="flex items-center gap-2"><input type="radio" name="updateGender" class="text-primary" checked> Female</label></div></div>
                                    </div>
                                    <div class="space-y-6">
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-2">Owner (Read-only)</label>
                                            <div class="relative"><input type="text" class="w-full px-4 py-2 pl-10 border border-gray-200 bg-gray-100 rounded-lg outline-none text-gray-500" value="Nguyen Van A (ID: 101)" readonly><i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i></div>
                                        </div>
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Photo URL</label><input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none" value="https://images.unsplash.com/photo-1543466835..."></div>
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Note</label><textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg h-20 outline-none">Allergic to seafood.</textarea></div>
                                        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Description</label><textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg h-24 outline-none">Obedient, gentle, fully vaccinated.</textarea></div>
                                    </div>
                                </div>
                                <div class="mt-8 flex justify-end gap-4 border-t pt-6">
                                    <a th:href="@{/staff/pet/detail}" class="px-6 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 text-center">Cancel</a>
                                    <button type="button" class="px-6 py-2 rounded-lg bg-primary text-white hover:bg-primaryHover shadow-md font-semibold">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</section>
</html>
