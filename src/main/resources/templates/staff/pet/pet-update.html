<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/staff_layout :: layout(~{::content})}">

<section th:fragment="content">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">
    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="bg-gray-50 min-h-screen p-6">
        <div class="max-w-4xl mx-auto fade-in">
            <a th:href="@{/staff/pet/detail}" class="inline-flex items-center gap-2 text-gray-500 hover:text-orange-600 mb-6 font-medium transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Detail
            </a>
            
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-8 text-white">
                    <h2 class="text-3xl font-bold flex items-center gap-3">
                        <i class="fa-solid fa-pen-to-square"></i> Update Profile
                    </h2>
                    <p class="mt-2 text-blue-100 opacity-90">Edit details for pet <span class="font-bold underline">LuLu</span>.</p>
                </div>
                
                <form class="p-8 md:p-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        <div class="space-y-6">
                            <div><label class="block text-sm font-bold text-gray-700 mb-2">Pet Name *</label><input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" value="LuLu"></div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-bold text-gray-700 mb-2">Species</label><select class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50"><option value="dog" selected>Dog</option></select></div>
                                <div><label class="block text-sm font-bold text-gray-700 mb-2">Breed</label><input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50" value="Corgi"></div>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Owner (Read-only)</label>
                                <div class="relative"><input type="text" class="w-full px-4 py-3 pl-11 border border-gray-200 bg-gray-100 rounded-lg text-gray-500 cursor-not-allowed" value="Nguyen Van A (ID: 101)" readonly><i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i></div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Status</label>
                                <select class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50"><option value="true">Active / Alive</option><option value="false">Inactive / Deceased</option></select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-10 flex justify-end gap-4 border-t border-gray-100 pt-6">
                        <a th:href="@{/staff/pet/detail}" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 font-semibold transition">Cancel</a>
                        <button type="button" class="px-8 py-3 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow-lg font-bold transition">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
