<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/staff_layout :: layout(~{::content})}">

<section th:fragment="content">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">
    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="bg-gray-50 min-h-screen p-6">
        <div class="max-w-7xl mx-auto fade-in">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-3xl font-extrabold text-gray-800">Pet Profiles</h2>
                    <p class="text-sm text-gray-500 mt-1">Manage customer pets and shop inventory (Feature 2.2)</p>
                </div>
                <a th:href="@{/staff/pet/create}" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 transition transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-plus"></i> Add New Pet
                </a>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 border border-gray-100">
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" placeholder="Search by pet name or owner name..." class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                </div>
                <div class="flex gap-4">
                    <select class="border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500 text-gray-600 bg-white">
                        <option value="">All Statuses</option>
                        <option value="1">For Sale (Shop)</option>
                        <option value="0">Owned (Customer)</option>
                    </select>
                    <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-3 rounded-lg transition"><i class="fa-solid fa-filter"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

                <div th:each="pet : ${pets}" class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition duration-300 overflow-hidden border border-gray-100 group relative flex flex-col">

                    <div class="absolute top-3 left-3 z-10 bg-gray-900/80 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm"
                         th:if="${pet.owner != null}">Owned</div>

                    <div class="absolute top-3 left-3 z-10 bg-green-600 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm shadow-sm"
                         th:if="${pet.owner == null}">For Sale</div>

                    <div class="h-56 overflow-hidden relative bg-gray-100">
                        <img th:src="${pet.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt="Pet Image">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                    </div>

                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-xl font-bold text-gray-800 group-hover:text-orange-600 transition" th:text="${pet.name}">Pet Name</h3>
                                <p class="text-sm text-gray-500 font-medium">
                                    <span th:text="${pet.breed}">Breed</span> • <span th:text="${pet.ageMonths}">0</span> Months
                                </p>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center">
                                <i class="fa-solid fa-dog" th:if="${pet.petType == 'dog'}"></i>
                                <i class="fa-solid fa-cat" th:if="${pet.petType == 'cat'}"></i>
                            </div>
                        </div>

                        <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center">
                            <div th:if="${pet.owner != null}" class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold">U</div>
                                <span class="text-xs text-gray-500 font-semibold truncate max-w-[100px]" th:text="${pet.owner.fullName}">Owner Name</span>
                            </div>

                            <div th:if="${pet.owner == null}" class="flex items-center gap-2">
                                <span class="text-sm font-bold text-green-600" th:text="${#numbers.formatDecimal(pet.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                            </div>

                            <div class="flex gap-2">
                                <a th:href="@{/staff/pet/update(id=${pet.id})}" class="w-8 h-8 rounded-full bg-gray-50 hover:bg-blue-50 text-gray-400 hover:text-blue-600 flex items-center justify-center transition" title="Edit"><i class="fa-solid fa-pen"></i></a>
                                <a th:href="@{/staff/pet/detail(id=${pet.id})}" class="px-3 py-1 rounded-full bg-orange-50 hover:bg-orange-100 text-orange-600 text-xs font-bold transition flex items-center">Details <i class="fa-solid fa-arrow-right ml-1"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
