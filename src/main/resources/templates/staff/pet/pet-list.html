<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/staff_layout :: layout(~{::content})}">

<section th:fragment="content">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">
    <script th:src="@{/js/pet-dashboard.js}"></script>

    <!-- Đã xóa Sidebar trái, chỉ còn container nội dung chính -->
    <div class="bg-gray-50 min-h-screen p-6">
        <div class="max-w-7xl mx-auto fade-in">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-3xl font-extrabold text-gray-800">Pet Profiles</h2>
                    <p class="text-sm text-gray-500 mt-1">Manage customer pets and shop inventory (Feature 2.2)</p>
                </div>
                <a th:href="@{/staff/pet/create}" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 transition transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-plus"></i> Add New Pet
                </a>
            </div>
            
            <!-- Search & Filter Bar -->
            <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 border border-gray-100">
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" placeholder="Search by pet name or owner name..." class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                </div>
                <div class="flex gap-4">
                    <select class="border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500 text-gray-600 bg-white">
                        <option value="">All Statuses</option>
                        <option value="1">For Sale (Shop)</option>
                        <option value="0">Owned (Customer)</option>
                    </select>
                    <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-3 rounded-lg transition"><i class="fa-solid fa-filter"></i></button>
                </div>
            </div>

            <!-- Grid Danh sách -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

                <div th:each="pet : ${pets}" class="bg-white rounded-2xl ..."> <div class="absolute top-3 left-3 ...">
                    <span th:text="${pet.owner == null ? 'For Sale' : 'Owned'}">Owned</span>
                </div>

                    <div class="h-56 ...">
                        <img th:src="${pet.imageUrl}" class="w-full h-full object-cover ...">
                    </div>

                    <div class="p-5 ...">
                        <h3 class="text-xl font-bold ..." th:text="${pet.name}">LuLu</h3>
                        <p class="text-sm ..." th:text="${pet.breed} + ' • ' + ${pet.ageMonths} + ' Months'">Corgi</p>

                        <div class="mt-auto pt-4 ...">
                            <div class="flex items-center gap-2">
                    <span class="text-xs font-bold"
                          th:text="${pet.owner != null ? pet.owner.fullName : #numbers.formatDecimal(pet.price, 0, 'COMMA', 0, 'POINT') + ' VND'}">
                          Owner Name
                    </span>
                            </div>
                            <a th:href="@{/staff/pet/detail(id=${pet.id})}" class="...">Details</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
</html>
