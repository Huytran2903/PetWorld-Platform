<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/staff_layout :: layout(~{::postcheck_content})}">

    <div th:fragment="postcheck_content">
        <link rel="stylesheet" th:href="@{/css/post-check.css}" />

        <div class="hero">
            <div class="hero-inner">
                <div>
                    <h1>Service Note</h1>
                    <p>Leave your note and upload photos (optional), then confirm service done.</p>
                </div>
            </div>
        </div>

        <main class="container">
            <section class="card">
                <header class="card-header">
                    <div>
                        <h2 class="title">Post Check / Report</h2>
                    </div>
                    <div class="tag">FORM</div>
                </header>

                <div class="card-body">
                    <div th:if="${message}" class="note note-success" th:text="${message}"></div>
                    <div th:if="${error}" class="note note-error" th:text="${error}"></div>

                    <div class="summary" style="margin-bottom: 16px;">
                        <div class="kv">
                            <div class="k">Appointment</div>
                            <div class="v" th:text="${context.appointmentCode}">APP-000123</div>
                        </div>
                        <div class="kv">
                            <div class="k">Pet</div>
                            <div class="v" th:text="${context.petName}">Lucky</div>
                        </div>
                        <div class="kv">
                            <div class="k">Service</div>
                            <div class="v" th:text="${context.serviceName ?: 'N/A'}">Service</div>
                        </div>
                    </div>

                    <form th:action="@{/staff/health-check/{appointmentId}/submit(appointmentId=${context.appointmentId},serviceLineId=${context.serviceLineId})}"
                          th:object="${submitRequest}"
                          method="post"
                          enctype="multipart/form-data">

                        <div style="margin-top:12px;">
                            <label for="note">Service Note</label>
                            <textarea id="note" th:field="*{note}" placeholder="Write what you did, issues found, etc."></textarea>
                        </div>

                        <div style="margin-top:12px;" class="upload">
                            <label for="photos">Photo(s)</label>
                            <input id="photos" name="photos" type="file" accept="image/*" multiple />
                            <small>Photo is optional.</small>
                        </div>

                        <div class="actions">
                            <button class="btn btn-primary" type="submit">Confirm Done</button>
                            <a class="btn btn-secondary" th:href="@{/staff/appointment_detail(id=${context.appointmentId})}">Back</a>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

</th:block>
</html>
