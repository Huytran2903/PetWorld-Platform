<!-- Đặt file này vào: src/main/resources/templates/fragments/sidebar-staff.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Sidebar</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Sidebar CSS -->
    <link rel="stylesheet" th:href="@{/css/sidebar-staff.css}">
</head>
<body>
    <!-- Fragment aside cho staff với tham số activePage -->
    <aside th:fragment="aside(activePage)" class="sidebar">
        <div class="sidebar-header">
            <h3>Staff Menu</h3>
            <p>Quản lý nhân viên</p>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a th:href="@{/staff/dashboard}"
                       th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/services}"
                       th:classappend="${activePage == 'services'} ? 'active' : ''">
                        <i class="fas fa-concierge-bell"></i> Dịch vụ
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/service-execution-history}"
                       th:classappend="${activePage == 'service-history'} ? 'active' : ''">
                        <i class="fas fa-history"></i> Lịch sử thực hiện
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/service-stats}"
                       th:classappend="${activePage == 'service-stats'} ? 'active' : ''">
                        <i class="fas fa-chart-bar"></i> Thống kê dịch vụ
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/customers}"
                       th:classappend="${activePage == 'customers'} ? 'active' : ''">
                        <i class="fas fa-users"></i> Khách hàng
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/appointments}"
                       th:classappend="${activePage == 'appointments'} ? 'active' : ''">
                        <i class="fas fa-calendar-alt"></i> Lịch hẹn
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/bookings}"
                       th:classappend="${activePage == 'bookings'} ? 'active' : ''">
                        <i class="fas fa-book"></i> Đặt chỗ
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/profile}"
                       th:classappend="${activePage == 'profile'} ? 'active' : ''">
                        <i class="fas fa-user"></i> Hồ sơ
                    </a>
                </li>
                <li>
                    <a th:href="@{/staff/settings}"
                       th:classappend="${activePage == 'settings'} ? 'active' : ''">
                        <i class="fas fa-cog"></i> Cài đặt
                    </a>
                </li>
                <li>
                    <a th:href="@{/logout}">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
</body>
</html>
