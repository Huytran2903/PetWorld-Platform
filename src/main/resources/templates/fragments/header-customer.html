<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header" class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <a th:href="@{/home}" class="text-2xl font-extrabold text-orange-600 flex items-center gap-2">
                    <i class="fa-solid fa-paw"></i> PetWorld
                </a>
            </div>

            <nav class="hidden md:flex space-x-8">
                <a th:href="@{/home}" class="text-gray-600 hover:text-orange-600 px-3 py-2 font-medium">Home</a>
                <a th:href="@{/shop}" class="text-gray-600 hover:text-orange-600 px-3 py-2 font-medium">Shop</a>
                <a th:href="@{/services}" class="text-gray-600 hover:text-orange-600 px-3 py-2 font-medium">Services</a>
                <a th:href="@{/customer/pet/my-pets}" class="text-orange-600 border-b-2 border-orange-600 px-3 py-2 font-bold">My Pets</a>
            </nav>

            <div class="flex items-center gap-4">
                <div th:if="${session.loggedInAccount != null}" class="flex items-center gap-3">
                    <span class="text-sm font-semibold text-gray-700" th:text="${session.loggedInAccount.fullName}">User</span>
                    <a th:href="@{/logout}" class="text-gray-400 hover:text-red-500 transition" title="Logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </a>
                </div>
                <div th:unless="${session.loggedInAccount != null}">
                    <a th:href="@{/login}" class="text-orange-600 font-bold hover:underline">Login</a>
                </div>
            </div>
        </div>
    </div>
</header>

</body>
</html>
