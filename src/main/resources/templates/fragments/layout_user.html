<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetWorld Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        /* Keep Bootstrap container widths consistent with homepage even when Tailwind is loaded. */
        body.pw-layout .container {
            width: 100%;
            padding-right: calc(var(--bs-gutter-x, 1.5rem) * 0.5);
            padding-left: calc(var(--bs-gutter-x, 1.5rem) * 0.5);
            margin-right: auto;
            margin-left: auto;
            max-width: none;
        }

        @media (min-width: 576px) {
            body.pw-layout .container {
                max-width: 540px;
            }
        }

        @media (min-width: 768px) {
            body.pw-layout .container {
                max-width: 720px;
            }
        }

        @media (min-width: 992px) {
            body.pw-layout .container {
                max-width: 960px;
            }
        }

        @media (min-width: 1200px) {
            body.pw-layout .container {
                max-width: 1140px;
            }
        }

        @media (min-width: 1400px) {
            body.pw-layout .container {
                max-width: 1320px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen pw-layout">

<div th:replace="~{fragments/header-customer :: header(activePage=${activePage ?: ''})}"></div>
<main class="flex-grow">
    <section th:replace="${content}"></section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
