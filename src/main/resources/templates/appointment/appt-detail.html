<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/layout-public :: layout(~{::content}, ~{::headExtras}, ~{::pageScripts})}"
      th:with="activePage='booking', pageTitle='Appointment Detail'">
<th:block th:fragment="headExtras">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/appt-detail.css}"/>
</th:block>
<div th:fragment="content">
<div class="container p-3">
    <div class="appointment-card mx-auto">

        <div class="card-header-custom d-flex justify-content-between align-items-center">
            <h2 class="header-title">Detail Appointment</h2>
            <button onclick="history.back()" class="btn-close-custom">
                Close <i class="bi bi-x-lg ms-1"></i>
            </button>
        </div>

        <div class="card-body p-4 p-md-5">
            <form>
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control form-control-custom" value="Jane" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control form-control-custom" value="Cooper" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control form-control-custom" value="+84 9876543210" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date & Time</label>
                        <input type="text" class="form-control form-control-custom" value="13-Aug-2026 at 10:00 AM"
                               readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label d-block">Status</label>
                        <div class="status-badge">
                            Open
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-5">
                    <button type="button" class="btn btn-confirm">
                        Confirm
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
<th:block th:fragment="pageScripts"></th:block>
</html>
