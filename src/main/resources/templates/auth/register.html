<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">
</head>
<body>

<div class="register-page-wrapper">
    <div class="register-container">
        <div class="register-left-section">
            <img class="register-logo" th:src="@{/images/logo-petshop.png}" alt="Logo"/>

            <div class="register-form-container">
                <h1 class="register-form-title">Hello User!</h1>
                <p class="register-form-subtitle">Enter below details to create an account</p>

                <form id="registerForm" th:action="@{/do-register}" method="post" th:object="${customer}">

                    <div th:if="${error}" class="alert alert-danger" role="alert" style="font-size: 0.8rem;">
                        <span th:text="${error}"></span>
                    </div>

                    <div id="js-error" class="alert alert-danger d-none" role="alert" style="font-size: 0.8rem;"></div>

                    <div class="register-form-group">
                        <label for="register-username">USERNAME</label>
                        <input type="text" id="register-username" th:field="*{username}"
                               placeholder="Enter your username" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-email">Mail</label>
                        <input type="email" id="register-email" th:field="*{email}" placeholder="Enter your mail"
                               required/>
                    </div>


                    <div class="register-form-group">
                        <label for="register-fullname">Full Name</label>
                        <input type="text" id="register-fullname" th:field="*{fullName}"
                               placeholder="Enter your full name" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" th:field="*{passwordHash}"
                               placeholder="Enter password" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" name="confirmPassword"
                               placeholder="Confirm your password" required/>
                    </div>

                    <button type="submit" class="register-btn-signup">Sign Up</button>

                    <div class="mt-3 text-center">
                        <small>Already have an account? <a th:href="@{/login}"
                                                           class="text-decoration-none">Login</a></small>
                    </div>

                </form>
            </div>
        </div>

        <div class="register-right-section">
            <img class="register-pet-image" th:src="@{/images/img-register.png}" alt="Happy pet"/>
            <h2 class="register-slogan">Caring for Pets<br/>Like Family</h2>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('registerForm').addEventListener('submit', function (event) {
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-confirm-password').value;
        const errorDiv = document.getElementById('js-error');

        if (password !== confirmPassword) {
            event.preventDefault();
            errorDiv.textContent = "Confirm password does not match!";
            errorDiv.classList.remove('d-none');
        } else {
            errorDiv.classList.add('d-none');
        }
    });
</script>

</body>
</html>
