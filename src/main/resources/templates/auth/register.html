<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">
</head>
<body>

<div class="register-page-wrapper">
    <div class="register-container">
        <!-- LEFT SECTION - FORM -->
        <div class="register-left-section">
            <img class="register-logo" th:src="@{/images/logo-petshop.png}"
                 alt="Logo"/>

            <div class="register-form-container">
                <h1 class="register-form-title">Hello User!</h1>
                <p class="register-form-subtitle">Enter below details to create an account</p>

                <form>
                    <div class="register-form-group">
                        <label for="register-username">USERNAME</label>
                        <input type="text" id="register-username" placeholder="Enter your full name" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-email">Mail</label>
                        <input type="email" id="register-email" placeholder="Enter your mail" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="Enter password" required/>
                    </div>

                    <div class="register-form-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" placeholder="Confirm your password"
                               required/>
                    </div>

                    <button type="submit" class="register-btn-signup">Sign Up</button>

                    <div class="register-divider">
                        <span>Or</span>
                    </div>

                    <a href="#" class="register-btn-google">
                        <img src="https://cdn.cdnlogo.com/logos/g/35/google-icon.svg" alt="Google"/>
                        <span>Continue with Google</span>
                    </a>

                    <p class="register-login-link">
                        Already have an account? <a th:href="@{'/login'}">Login Here</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- RIGHT SECTION - IMAGE -->
        <div class="register-right-section">
            <img class="register-pet-image" th:src="@{/images/img-register.png}"
                 alt="Happy pet"/>
            <h2 class="register-slogan">Caring for Pets<br/>Like Family</h2>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
