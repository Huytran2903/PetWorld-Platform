<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8"/>
    <title>Login - Pet Care</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="login-page-wrapper">
    <div class="login-container">
        <!-- LEFT SECTION -->
        <div class="login-left-section">
            <img class="login-spa-image" th:src="@{/images/img-login.png}"
                 alt="Dog relaxing at spa"/>
            <h2 class="login-hero-text">Happy Pets<br/>Happy Owners</h2>
        </div>

        <!-- RIGHT SECTION -->
        <div class="login-right-section">
            <img class="login-logo" th:src="@{/images/logo-petshop.png}" alt="Logo"/>

            <div class="login-form-container">
                <h1 class="login-form-title">Welcome Back</h1>
                <p class="login-form-subtitle">Enter your email and password to access your account</p>

                <form>
                    <div class="login-form-group">
                        <label for="login-username">USERNAME</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required/>
                    </div>

                    <div class="login-form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required/>
                    </div>

                    <div class="login-form-options">
                        <div class="login-remember-me">
                            <input type="checkbox" id="login-remember"/>
                            <label for="login-remember">Remember Me</label>
                        </div>
                        <a th:href="@{'/changePassword'}" class="login-forgot-link">Forgot Password</a>
                    </div>

                    <button type="submit" class="login-btn-signin">Sign In</button>

                    <div class="login-divider">
                        <span>Or</span>
                    </div>

                    <button type="button" class="login-btn-google">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
                        <span>Sign in with Google</span>
                    </button>

                    <p class="login-signup-link">
                        Don't have an account? <a th:href="@{'/register'}">Sign Up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
