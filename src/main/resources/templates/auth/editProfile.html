<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<main class="edit-profile-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8"> <div class="card-custom">

                <div class="card-header-custom">
                    <h2>Profile Settings</h2>
                    <p>Manage your personal information and preferences</p>
                </div>

                <div class="card-body p-4">

                    <div class="avatar-section">
                        <div class="avatar-circle">
                        </div>
                    </div>

                    <form>
                        <div class="row g-4">

                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" value="Nguyen Van A" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">User Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" class="form-control" value="A@123" >
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="email">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="a.9120@example.com">
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="phone">Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control" id="phone" value="(+84)0955106454">
                                </div>
                            </div>

                            <div class="col-12 mt-5 d-flex gap-3">
                                <a th:href="@{/profile}" class="btn-save">Save</a>

                                <a th:href="@{/profile}" class="btn-cancel">Cancel</a>
                            </div>

                        </div>
                    </form>
                </div> </div> </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
