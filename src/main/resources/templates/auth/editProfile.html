<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="edit-profile-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card-custom">

                    <div class="card-header-custom">
                        <h2>Profile Settings</h2>
                        <p>Manage your personal information and preferences</p>
                    </div>

                    <div class="card-body p-4">

                        <div class="avatar-section">
                            <div class="avatar-circle">
                                <span th:text="${#strings.substring(user.fullName, 0, 1)}"></span>
                            </div>
                        </div>

                        <form th:action="@{/profile/do-edit}" method="post" th:object="${user}">
                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <span th:text="${error}">Error message</span>
                            </div>
                            <div class="row g-4">

                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" th:field="*{fullName}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">User Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                        <input type="text" class="form-control" th:field="*{username}" readonly
                                               style="background-color: #e9ecef;">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="email">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control" id="email" th:field="*{email}">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="phone">Phone</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="tel" class="form-control" id="phone" th:field="*{phone}">
                                    </div>
                                </div>

                                <div class="col-12 mt-5 d-flex gap-3">
                                    <button type="submit" class="btn btn-primary btn-save">Save Changes</button>

                                    <a th:href="@{/profile}" class="btn btn-secondary btn-cancel">Cancel</a>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
