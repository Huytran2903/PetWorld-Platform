<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Change Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<main class="page-change-password-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">

                <div class="card-custom">

                    <div class="card-header-custom">
                        <div class="icon-wrapper">
                            <img th:src="@{/img/Icon-pass.svg}" width="24" height="24"
                                 style="filter: brightness(0) invert(1);">
                        </div>
                        <h2>Change Password</h2>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form method="post" action="#" novalidate>

                            <div class="row g-3 mb-4">
                                <div class="col-12">
                                    <label for="username" class="form-label">
                                        <img th:src="@{/img/Icon-person.svg}" class="custom-icon me-1" alt="">
                                        User name
                                    </label>
                                    <input type="text" class="form-control" id="username" name="username"
                                           value="nguyenvana" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">
                                        Email <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <img th:src="@{/img/icon-email.svg}" class="custom-icon" alt="">
                                        </span>
                                        <input type="email" class="form-control border-start-0 ps-0" id="email"
                                               name="email" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="phone" class="form-label">
                                        <img th:src="@{/img/Icon-phone.svg}" class="custom-icon me-1" alt="">
                                        Phone <span class="text-danger">*</span>
                                    </label>
                                    <input type="tel" class="form-control" id="phone" name="phone" value="0123456789"
                                           required>
                                </div>
                            </div>

                            <hr class="my-4 text-muted opacity-25">

                            <div class="mb-4">
                                <div class="form-section-title mb-3 d-flex align-items-center gap-2"
                                     style="font-weight: 600;">
                                    <img th:src="@{/img/Icon-pass.svg}" class="custom-icon" alt="">
                                    Password Management
                                </div>

                                <div class="mb-3">
                                    <label for="old-password" class="form-label">Old password <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="old-password"
                                               name="old-password" placeholder="Enter old password" required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/img/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="new-password" class="form-label">New password <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="new-password"
                                               name="new-password" placeholder="Min 8 characters" minlength="8"
                                               required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/img/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirm-password" class="form-label">Confirm new password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="confirm-password"
                                               name="confirm-password" placeholder="Confirm new password" required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/img/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 pt-3 border-top">
                                <button type="submit" class="btn btn-save flex-grow-1">Save</button>
                                <button type="button" class="btn btn-cancel flex-grow-1">Cancel</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function () {
            const input = this.parentElement.querySelector('input');
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
