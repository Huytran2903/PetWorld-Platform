<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body>

<main class="profile-settings-wrapper">
    <div class="container">

        <header class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <div class="welcome-text">
                <h1 class="h3 fw-medium text-dark mb-1">Welcome, UserName</h1>
                <time class="text-muted fw-light small">Tue, 07 June 2022</time>
            </div>

            <nav class="d-flex gap-3">
                <button class="nav-btn" aria-label="Home">
                    <i class="bi bi-house"></i> </button>
                <button class="nav-btn" aria-label="Menu">
                    <i class="bi bi-list"></i>
                </button>
                <button class="nav-btn" aria-label="Grid">
                    <i class="bi bi-grid"></i>
                </button>
                <button class="nav-btn" aria-label="Orders">
                    <i class="bi bi-bag"></i>
                </button>
                <button class="nav-btn position-relative" aria-label="Notifications">
                    <i class="bi bi-bell"></i>
                </button>
                <div class="nav-item">
                    <img class="nav-avatar" src="img/rectangle-1072.png" alt="User avatar" onerror="this.src='https://via.placeholder.com/48'"/>
                </div>
            </nav>
        </header>

        <div class="card main-card">

            <div class="banner-container">
                <img class="banner-img" src="img/rectangle-6691.svg" alt="Banner" onerror="this.style.display='none'"/>
            </div>

            <div class="profile-header-info d-flex flex-wrap align-items-end justify-content-between">
                <div class="d-flex align-items-end gap-3">
                    <img class="avatar-large" src="img/ellipse-11.png" alt="Profile" onerror="this.src='https://via.placeholder.com/94'"/>

                    <div class="pb-2">
                        <h2 class="h5 fw-medium mb-0">Alexa Rawles</h2>
                        <p class="text-muted small mb-0">alexarawles@gmail.com</p>
                    </div>
                </div>

                <div class="pb-3 mt-3 mt-md-0 d-flex gap-2">
                    <button class="btn btn-yellow px-4 py-2" type="button">Change password</button>
                    <button class="btn btn-blue px-4 py-2" type="button">Edit</button>
                </div>
            </div>

            <div class="form-section">
                <form>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label" for="fullName">Full Name</label>
                            <input class="form-control" type="text" id="fullName" name="fullName" placeholder="Your Full Name">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="userName">User name</label>
                            <input class="form-control" type="text" id="userName" name="userName" placeholder="Your User Name">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="phone">Phone</label>
                            <input class="form-control" type="tel" id="phone" name="phone" placeholder="Your Phone Number">
                        </div>
                    </div>

                    <div class="email-section">
                        <h3 class="h6 fw-medium mb-3">My email Address</h3>
                        <div class="d-flex align-items-center gap-3">
                            <div class="email-icon-box">
                                <i class="bi bi-envelope-fill"></i>
                            </div>
                            <div>
                                <span class="d-block text-dark">alexarawles@gmail.com</span>
                                <small class="text-muted">1 month ago</small>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
