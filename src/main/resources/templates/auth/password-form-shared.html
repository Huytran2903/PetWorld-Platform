<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${formMode == 'CHANGE' ? 'Change Password' : 'Reset Password'}">Password Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="page-change-password-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card-custom">

                    <div class="card-header-custom">
                        <div class="icon-wrapper">
                            <img th:src="@{/images/Icon-pass.svg}" width="24" height="24"
                                 style="filter: brightness(0) invert(1);">
                        </div>
                        <h2 th:text="${formMode == 'CHANGE' ? 'Change Password' : 'Reset Password'}">Change
                            Password</h2>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                        <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

                        <form method="post"
                              th:action="${formMode == 'CHANGE' ? '/profile/change-password' : '/reset-password'}"
                              novalidate>

                            <input type="hidden" name="token" th:value="${token}" th:if="${formMode == 'RESET'}"/>

                            <div class="row g-3 mb-4" th:if="${formMode == 'CHANGE'}">
                                <div class="col-12">
                                    <label for="username" class="form-label">
                                        <img th:src="@{/images/Icon-person.svg}" class="custom-icon me-1" alt="">
                                        User name
                                    </label>
                                    <input type="text" class="form-control bg-light" id="username"
                                           th:value="${user != null ? user.username : ''}" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <img th:src="@{/images/icon-email.svg}" class="custom-icon" alt="">
                                        </span>
                                        <input type="email" class="form-control border-start-0 ps-0 bg-light" id="email"
                                               th:value="${user != null ? user.email : ''}" readonly>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="phone" class="form-label">
                                        <img th:src="@{/images/Icon-phone.svg}" class="custom-icon me-1" alt="">
                                        Phone
                                    </label>
                                    <input type="tel" class="form-control bg-light" id="phone"
                                           th:value="${user != null ? user.phoneNumber : ''}" readonly>
                                </div>
                            </div>

                            <hr class="my-4 text-muted opacity-25" th:if="${formMode == 'CHANGE'}">

                            <div class="mb-4">
                                <div class="form-section-title mb-3 d-flex align-items-center gap-2"
                                     style="font-weight: 600;">
                                    <img th:src="@{/images/Icon-pass.svg}" class="custom-icon" alt="">
                                    Password Management
                                </div>

                                <div class="mb-3" th:if="${formMode == 'CHANGE'}">
                                    <label for="oldPassword" class="form-label">Old password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="oldPassword"
                                               name="oldPassword" placeholder="Enter old password" required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/images/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">New password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="newPassword"
                                               name="newPassword" placeholder="Min 8 characters" minlength="8" required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/images/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm new password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control border-end-0" id="confirmPassword"
                                               name="confirmPassword" placeholder="Confirm new password" required>
                                        <button class="btn btn-outline-secondary input-group-text toggle-password border-start-0"
                                                type="button" style="background: white;">
                                            <img th:src="@{/images/Icon-eye.svg}" class="custom-icon" alt="Show">
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 pt-3 border-top">
                                <button type="submit" class="btn btn-save flex-grow-1">Save Change</button>

                                <a th:href="@{/profile}" class="btn btn-cancel flex-grow-1"
                                   th:if="${formMode == 'CHANGE'}">Cancel</a>
                                <a th:href="@{/login}" class="btn btn-cancel flex-grow-1"
                                   th:if="${formMode == 'RESET'}">Cancel</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function () {
            const input = this.parentElement.querySelector('input');
            if (input.type === "password") {
                input.type = "text";
                // Có thể đổi icon mắt nếu muốn
            } else {
                input.type = "password";
            }
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
