<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-customer :: layout(~{::content})}">
<head>
    <title>Register New Pet</title>
</head>
<section th:fragment="content">

    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="max-w-3xl mx-auto py-10 px-4">

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-800">Register New Pet</h1>
            <p class="text-gray-500 mt-2">Add your furry friend to start tracking their health and booking services.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <div th:if="${error}" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm" role="alert" th:text="${error}">
            </div>
            <form th:action="@{/customer/pet/pet-create}" th:object="${petDTO}" method="post" enctype="multipart/form-data" class="space-y-6" novalidate>

                <div class="flex flex-col items-center justify-center mb-6">
                    <div class="w-32 h-32 rounded-full overflow-hidden bg-gray-100 border-2 border-dashed border-gray-300 relative group mb-3">
                        <img id="imagePreview" src="/images/default-pet.png" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                            <i class="fa-solid fa-camera text-white text-2xl"></i>
                        </div>
                    </div>
                    <label for="imageFile" class="cursor-pointer bg-orange-50 text-orange-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-orange-100 transition">
                        Upload Photo
                    </label>
                    <input type="file" id="imageFile" th:field="*{imageFile}" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Pet Name <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{name}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition" placeholder="e.g. Milo">
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Species (Type) <span class="text-red-500">*</span></label>
                        <select th:field="*{species}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none bg-white">
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Other">Other</option>
                        </select>
                        <p th:if="${#fields.hasErrors('species')}" th:errors="*{species}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Breed <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{breed}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden Retriever">
                        <p th:if="${#fields.hasErrors('breed')}" th:errors="*{breed}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" data-validate-label="Age (months)">Age (Months) <span class="text-red-500">*</span></label>
                        <input type="number" th:field="*{age}" min="1" max="50" step="1" required data-validate-label="Age (months)"
                               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none js-validate-number" placeholder="e.g. 12">
                        <p th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Gender <span class="text-red-500">*</span></label>
                        <select th:field="*{gender}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none bg-white">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                        <p th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" data-validate-label="Weight (kg)">Weight (Kg) <span class="text-red-500">*</span></label>
                        <input type="number" step="0.1" min="0.1" max="100" th:field="*{weightKg}" required
                               data-validate-label="Weight (kg)"
                               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none js-validate-number" placeholder="e.g. 5.5">
                        <p th:if="${#fields.hasErrors('weightKg')}" th:errors="*{weightKg}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Color <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{color}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden">
                        <p th:if="${#fields.hasErrors('color')}" th:errors="*{color}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Health Notes / Allergies</label>
                    <textarea th:field="*{note}" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Any special needs or medical history..."></textarea>
                </div>

                <div class="flex items-center gap-4 mt-8 pt-6 border-t border-gray-100">
                    <a th:href="@{/customer/pet/my-pets}" class="w-1/3 text-center py-3 rounded-lg border border-gray-300 text-gray-600 font-bold hover:bg-gray-50 transition">Cancel</a>
                    <button type="submit" class="w-2/3 py-3 rounded-lg bg-orange-600 text-white font-bold hover:bg-orange-700 shadow-lg transition transform hover:-translate-y-0.5">
                        Complete Registration
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            function labelFor(input) {
                return input.getAttribute('data-validate-label') || 'This field';
            }
            function setMsg(input) {
                var L = labelFor(input);
                if (input.validity.valueMissing) {
                    input.setCustomValidity(L + ' is required.');
                    return;
                }
                if (input.validity.rangeUnderflow) {
                    input.setCustomValidity(L + ' is below the minimum allowed value.');
                    return;
                }
                if (input.validity.rangeOverflow) {
                    input.setCustomValidity(L + ' is above the maximum allowed value.');
                    return;
                }
                if (input.validity.stepMismatch) {
                    input.setCustomValidity(L + ' must match the allowed step (e.g. 0.1 for decimals).');
                    return;
                }
                if (input.validity.badInput || input.validity.typeMismatch) {
                    input.setCustomValidity('Please enter a valid number for ' + L + '.');
                    return;
                }
                input.setCustomValidity('');
            }
            document.querySelectorAll('.js-validate-number').forEach(function (el) {
                el.addEventListener('invalid', function () { setMsg(el); });
                el.addEventListener('input', function () { el.setCustomValidity(''); });
            });
        })();
    </script>
</section>
</html>
