<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-customer :: layout(~{::content})}">
<head>
    <title>Update Pet Profile</title>
</head>
<section th:fragment="content">

    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="max-w-3xl mx-auto py-10 px-4">

        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">Edit Profile</h1>
            <a th:href="@{/customer/pet/my-pets}" class="text-gray-500 hover:text-orange-600 font-bold transition">
                <i class="fa-solid fa-xmark mr-1"></i> Cancel
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <div th:if="${message}" class="mb-6 p-4 rounded-lg bg-green-50 border border-green-200 text-green-800 text-sm" role="status" th:text="${message}">
            </div>
            <div th:if="${error}" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm" role="alert" th:text="${error}">
            </div>
            <form th:action="@{/customer/pet/pet-update}" th:object="${pet}" method="post" enctype="multipart/form-data" class="space-y-6" novalidate>

                <input type="hidden" th:field="*{petID}">
                <input type="hidden" th:field="*{imageUrl}">
                <input type="hidden" th:field="*{gender}">

                <div class="flex items-center gap-6 mb-6">
                    <div class="w-24 h-24 rounded-full overflow-hidden bg-gray-100 border border-gray-200">
                        <img id="imagePreview" th:src="*{imageUrl != null ? imageUrl : '/images/default-pet.png'}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Update Photo</label>
                        <input type="file" name="imageFile" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" onchange="previewImage(this)">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Pet Name <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{name}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Breed <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{breed}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden Retriever">
                        <p th:if="${#fields.hasErrors('breed')}" th:errors="*{breed}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" data-validate-label="Age (months)">Age (Months) <span class="text-red-500">*</span></label>
                        <input type="number" th:field="*{ageMonths}" min="1" max="50" step="1" required
                               data-validate-label="Age (months)"
                               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none js-validate-number">
                        <p th:if="${#fields.hasErrors('ageMonths')}" th:errors="*{ageMonths}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" data-validate-label="Weight (kg)">Weight (Kg) <span class="text-red-500">*</span></label>
                        <input type="number" step="0.1" min="0.1" max="100" th:field="*{weightKg}" required
                               data-validate-label="Weight (kg)"
                               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none js-validate-number">
                        <p th:if="${#fields.hasErrors('weightKg')}" th:errors="*{weightKg}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Species <span class="text-red-500">*</span></label>
                        <select th:field="*{petType}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none">
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Other">Other</option>
                        </select>
                        <p th:if="${#fields.hasErrors('petType')}" th:errors="*{petType}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Color <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{color}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                        <p th:if="${#fields.hasErrors('color')}" th:errors="*{color}" class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Medical / Care Notes</label>
                    <textarea th:field="*{note}" rows="4" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
                </div>

                <button type="submit" class="w-full py-3 rounded-lg bg-orange-600 text-white font-bold hover:bg-orange-700 shadow-lg transition">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <script>
        (function () {
            function labelFor(input) {
                return input.getAttribute('data-validate-label') || 'This field';
            }
            function setMsg(input) {
                var L = labelFor(input);
                if (input.validity.valueMissing) {
                    input.setCustomValidity(L + ' is required.');
                    return;
                }
                if (input.validity.rangeUnderflow) {
                    input.setCustomValidity(L + ' is below the minimum allowed value.');
                    return;
                }
                if (input.validity.rangeOverflow) {
                    input.setCustomValidity(L + ' is above the maximum allowed value.');
                    return;
                }
                if (input.validity.stepMismatch) {
                    input.setCustomValidity(L + ' must match the allowed step (e.g. 0.1 for decimals).');
                    return;
                }
                if (input.validity.badInput || input.validity.typeMismatch) {
                    input.setCustomValidity('Please enter a valid number for ' + L + '.');
                    return;
                }
                input.setCustomValidity('');
            }
            document.querySelectorAll('.js-validate-number').forEach(function (el) {
                el.addEventListener('invalid', function () { setMsg(el); });
                el.addEventListener('input', function () { el.setCustomValidity(''); });
            });
        })();
    </script>
</section>
</html>
