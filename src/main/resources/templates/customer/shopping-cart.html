<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shopping-cart.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="shopping-cart-page min-vh-100 d-flex flex-column">
    <div class="container-fluid py-4 px-md-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <i class="bi bi-cart3 fs-2 text-dark"></i>
            <h1 class="h3 mb-0 fw-bold text-dark">Shopping Cart</h1>
            <span class="text-secondary fs-5"
                  th:text="'(' + ${cart != null && cart.items != null ? cart.items.size() : 0} + ' items)'">
                (0 items)
            </span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8 col-xl-9">
                <div class="card border-0 rounded-4 overflow-hidden shadow-sm">
                    <div class="card-body p-0">

                        <div th:if="${cart == null || cart.items == null || cart.items.isEmpty()}" class="p-5 text-center">
                            <i class="bi bi-basket2 fs-1 text-secondary"></i>
                            <p class="mt-3 text-secondary">Your cart is currently empty.</p>
                            <a href="/product/productList" class="btn btn-outline-dark rounded-pill px-4">Continue Shopping</a>
                        </div>

                        <div th:if="${cart != null && cart.items != null}" th:each="item: ${cart.items}" class="cart-item p-3 border-bottom">
                            <div class="d-flex gap-3 align-items-center">

                                <div class="product-img flex-shrink-0"
                                     th:style="'background-image: url(' +
                                     (${item.pet != null ? item.pet.imageUrl : (item.product != null ? item.product.imageUrl : '/images/default.png')}) + ');'">
                                </div>

                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="mb-0 fw-bold"
                                            th:text="${item.pet != null ? item.pet.name : (item.product != null ? item.product.name : 'Unknown')}">
                                            Item Name
                                        </h5>

                                        <a th:href="@{/cart/remove/{id}(id=${item.cartItemId})}" class="btn btn-link btn-remove text-danger">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </a>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-end">
                                        <div class="quantity-control">
                                            <button type="button" th:if="${item.product != null}"><i class="bi bi-dash fs-5"></i></button>
                                            <span class="fw-bold user-select-none px-2" th:text="${item.quantity}">1</span>
                                            <button type="button" th:if="${item.product != null}"><i class="bi bi-plus fs-5"></i></button>
                                        </div>

                                        <span class="price-text h5 mb-0 fw-bold"
                                              th:text="${#numbers.formatCurrency((item.pet != null ? item.pet.salePrice : item.product.salePrice) * item.quantity)}">
                                           $0.00
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-xl-3">
                <div class="card border-0 rounded-4 bg-light shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Order Summary</h5>

                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Subtotal</span>
                            <span class="text-dark fw-bold"
                                  th:text="${tax != null ? #numbers.formatCurrency(tax) : '$0.00'}">
    $0.00
</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Shipping</span>
                            <span class="text-success fw-bold">Free</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Tax (10%)</span>
                            <span class="text-dark fw-bold"
                                  th:text="${tax != null ? #numbers.formatCurrency(tax) : '$0.00'}">
    $0.00
</span>
                        </div>

                        <hr class="my-4 text-secondary opacity-25">

                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Total</span>
                            <span class="fw-bold fs-5 text-primary"
                                  th:text="${total != null ? #numbers.formatCurrency(total) : '$0.00'}">
    $0.00
</span>
                        </div>

                        <button class="btn btn-dark w-100 py-3 mb-2 rounded-3 fw-bold shadow-sm">Proceed to Checkout</button>
                        <a href="/product/productList" class="btn btn-outline-secondary bg-white w-100 py-2 rounded-3">Continue Shopping</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
