<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shopping-cart.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="shopping-cart-page min-vh-100 d-flex flex-column">
    <div class="container-fluid py-4 px-md-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <i class="bi bi-cart3 fs-2 text-dark"></i> <h1 class="h3 mb-0 fw-bold text-dark">Shopping Cart</h1>
            <span class="text-secondary fs-5">(4 items)</span>
        </div>

        <div class="row g-4">

            <div class="col-lg-8 col-xl-9">
                <div class="card border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0">

                        <div class="cart-item p-3 border-bottom">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="product-img flex-shrink-0" style="background-image: url('https://placehold.co/100x100/png?text=Poodle');"></div>

                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="mb-0 fw-bold">Poodle</h5>
                                        <button class="btn btn-link btn-remove text-decoration-none" title="Remove item">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </button>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-end">
                                        <div class="quantity-control">
                                            <button type="button"><i class="bi bi-dash fs-5"></i></button>
                                            <span class="fw-bold user-select-none">1</span>
                                            <button type="button"><i class="bi bi-plus fs-5"></i></button>
                                        </div>
                                        <span class="price-text h5 mb-0 fw-bold">$299.99</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="cart-item p-3 border-bottom">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="product-img flex-shrink-0" style="background-image: url('https://placehold.co/100x100/png?text=Cat');"></div>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="mb-0 fw-bold">Cat</h5>
                                        <button class="btn btn-link btn-remove text-decoration-none">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </button>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-end">
                                        <div class="quantity-control">
                                            <button type="button"><i class="bi bi-dash fs-5"></i></button>
                                            <span class="fw-bold user-select-none">1</span>
                                            <button type="button"><i class="bi bi-plus fs-5"></i></button>
                                        </div>
                                        <span class="price-text h5 mb-0 fw-bold">$259.98</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="cart-item p-3 border-bottom">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="product-img flex-shrink-0" style="background-image: url('https://placehold.co/100x100/png?text=Vitamin');"></div>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="mb-0 fw-bold">Vitamin</h5>
                                        <button class="btn btn-link btn-remove text-decoration-none">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </button>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-end">
                                        <div class="quantity-control">
                                            <button type="button"><i class="bi bi-dash fs-5"></i></button>
                                            <span class="fw-bold user-select-none">2</span>
                                            <button type="button"><i class="bi bi-plus fs-5"></i></button>
                                        </div>
                                        <span class="price-text h5 mb-0 fw-bold">$89.99</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="cart-item p-3">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="product-img flex-shrink-0" style="background-image: url('https://placehold.co/100x100/png?text=Food');"></div>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="mb-0 fw-bold">Food</h5>
                                        <button class="btn btn-link btn-remove text-decoration-none">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </button>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-end">
                                        <div class="quantity-control">
                                            <button type="button"><i class="bi bi-dash fs-5"></i></button>
                                            <span class="fw-bold user-select-none">3</span>
                                            <button type="button"><i class="bi bi-plus fs-5"></i></button>
                                        </div>
                                        <span class="price-text h5 mb-0 fw-bold">$34.99</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-xl-3">
                <div class="card border-0 rounded-4 bg-summary">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Order Summary</h5>

                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Subtotal</span>
                            <span class="text-dark fw-bold">$684.95</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Shipping</span>
                            <span class="text-dark fw-bold">Free</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-secondary">
                            <span>Tax</span>
                            <span class="text-dark fw-bold">$54.80</span>
                        </div>

                        <hr class="my-4 text-secondary opacity-25">

                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Total</span>
                            <span class="fw-bold fs-5">$739.75</span>
                        </div>

                        <button class="btn btn-dark-custom w-100 py-2 mb-2 rounded-3 fw-bold">Proceed to Checkout</button>
                        <button class="btn btn-outline-secondary bg-white w-100 py-2 rounded-3">Continue Shopping</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
