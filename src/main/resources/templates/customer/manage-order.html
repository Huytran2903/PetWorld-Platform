<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="/css/manage-order.css">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

    <style>
        .main-content {
            background-color: #f8f9fa;
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .status-pending {
            background-color: #fff3cd !important;
            color: #856404 !important;
        }

        .status-paid {
            background-color: #cce5ff !important;
            color: #004085 !important;
        }

        .status-processing {
            background-color: #e2d9f3 !important;
            color: #593196 !important;
        }

        .status-shipped {
            background-color: #d1ecf1 !important;
            color: #0c5460 !important;
        }

        .status-done {
            background-color: #d4edda !important;
            color: #155724 !important;
        }

        .status-canceled {
            background-color: #f8d7da !important;
            color: #721c24 !important;
        }

        .status-refunded {
            background-color: #e2e3e5 !important;
            color: #383d41 !important;
        }

        .status-select {
            border-radius: 50px;
            padding: 5px 15px;
            text-align: center;
            font-size: 0.875rem;
            cursor: pointer;
            width: 130px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7rem top 50%;
            background-size: .65rem auto;
        }

        .custom-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            border-bottom: 2px solid #eee;
        }

        .custom-table td {
            vertical-align: middle;
            border-bottom: 1px solid #f8f9fa;
        }
    </style>
</head>
<body class="bg-light m-0 p-0 overflow-hidden">

<div class="d-flex min-vh-100 w-100">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='orders')}"></div>

    <div class="flex-grow-1 p-4 p-md-5 main-content">

        <div class="mb-4 p-4 rounded-4 d-flex justify-content-between align-items-center shadow-sm"
             style="background-color: #FFF3E6; border: 1px solid #FFE0B2;">
            <div class="d-flex align-items-center">
                <div class="bg-white p-3 rounded-4 shadow-sm me-4 d-flex align-items-center justify-content-center"
                     style="width: 60px; height: 60px;">
                    <i class="bi bi-box-seam text-warning" style="font-size: 1.8rem;"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-1 text-dark">Orders Management</h2>
                    <p class="text-muted mb-0">Manage customer orders and transactions.</p>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 w-100">
            <div class="card-body p-4 p-lg-5">

                <form th:action="@{/admin/manage-order}" method="get" class="row g-3 mb-5 align-items-end p-4 rounded-4"
                      style="background-color: #FAFAFA; border: 1px solid #EAEAEA;">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">From Date</label>
                        <input type="date" name="startDate" th:value="${startDate}"
                               class="form-control rounded-pill shadow-none px-3 border-light-subtle">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">To Date</label>
                        <input type="date" name="endDate" th:value="${endDate}"
                               class="form-control rounded-pill shadow-none px-3 border-light-subtle">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">Status</label>
                        <select name="statusFilter"
                                class="form-select rounded-pill shadow-none px-3 border-light-subtle text-muted">
                            <option value="" th:selected="${statusFilter == null || statusFilter == ''}">All Statuses
                            </option>
                            <option value="pending" th:selected="${statusFilter == 'pending'}">Pending</option>
                            <option value="paid" th:selected="${statusFilter == 'paid'}">Paid</option>
                            <option value="processing" th:selected="${statusFilter == 'processing'}">Processing</option>
                            <option value="shipped" th:selected="${statusFilter == 'shipped'}">Shipped</option>
                            <option value="done" th:selected="${statusFilter == 'done'}">Done</option>
                            <option value="canceled" th:selected="${statusFilter == 'canceled'}">Canceled</option>
                            <option value="refunded" th:selected="${statusFilter == 'refunded'}">Refunded</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="submit" class="btn rounded-pill px-4 fw-bold w-100 text-dark shadow-sm"
                                style="background-color: #FFC107; border: none;">
                            <i class="bi bi-filter me-1"></i> Apply Filters
                        </button>
                        <a th:href="@{/admin/manage-order}"
                           class="btn bg-white border border-light-subtle rounded-pill px-3 shadow-sm text-muted"
                           title="Reset Filters">
                            <i class="bi bi-arrow-clockwise"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive w-100">
                    <table class="table custom-table table-hover align-middle mb-0 w-100">
                        <thead>
                        <tr>
                            <th class="py-3 ps-2">ORDER ID</th>
                            <th class="py-3">CUSTOMER NAME</th>
                            <th class="py-3">ORDER DATE</th>
                            <th class="py-3">STATUS</th>
                            <th class="py-3 text-end pe-2">TOTAL AMOUNT</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${ord}">
                            <td class="fw-bold text-dark ps-2" th:text="'#' + ${o.orderID}"></td>
                            <td class="fw-bold text-dark" th:text="${o.shipName}">Alice Smith</td>
                            <td class="text-muted" th:text="${#temporals.format(o.createdAt, 'MMM dd, yyyy')}"></td>
                            <td>
                                <form th:action="@{/admin/orders/update-status}" method="post" class="m-0">
                                    <input type="hidden" name="orderID" th:value="${o.orderID}">

                                    <select name="status"
                                            class="status-select fw-semibold"
                                            th:classappend="'status-' + ${o.status}"
                                            onchange="this.form.submit()"
                                            th:disabled="${o.status == 'done' or o.status == 'canceled'}">

                                        <option value="pending" th:selected="${o.status == 'pending'}"
                                                th:if="${o.status != 'paid' and o.status != 'shipped'}">Pending
                                        </option>

                                        <option value="paid" th:selected="${o.status == 'paid'}">Paid</option>
                                        <option value="processing" th:selected="${o.status == 'processing'}">
                                            Processing
                                        </option>
                                        <option value="shipped" th:selected="${o.status == 'shipped'}">Shipped</option>
                                        <option value="done" th:selected="${o.status == 'done'}">Done</option>
                                        <option value="canceled" th:selected="${o.status == 'canceled'}"
                                                th:if="${o.status != 'paid' and o.status != 'shipped'}">Canceled
                                        </option>
                                        <option value="refunded" th:selected="${o.status == 'refunded'}">Refunded
                                        </option>
                                    </select>
                                </form>
                            </td>
                            <td class="text-dark fw-bold text-end pe-2"
                                th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></td>
                        </tr>

                        <tr th:if="${ord.isEmpty()}">
                            <td colspan="5" class="text-center py-5">
                                <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                                     style="width: 80px; height: 80px;">
                                    <i class="bi bi-search text-muted fs-1"></i>
                                </div>
                                <h5 class="fw-bold text-dark mb-1">No orders found</h5>
                                <p class="text-muted mb-0">Try adjusting your filters to find what you're looking
                                    for.</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${ord.totalPages > 1}" class="mt-5">
                    <ul class="pagination justify-content-center mb-0 gap-2">

                        <li class="page-item" th:classappend="${ord.number == 0} ? 'disabled'">
                            <a class="page-link rounded-3 border-0 shadow-sm text-dark px-3"
                               th:href="@{/admin/manage-order(page=${ord.number - 1}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}">Previous</a>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(0, ord.totalPages - 1)}"
                            th:classappend="${i == ord.number} ? 'active'">
                            <a class="page-link rounded-3 border-0 shadow-sm px-3 fw-bold"
                               th:style="${i == ord.number ? 'background-color: #FFC107; color: #000;' : 'color: #333;'}"
                               th:href="@{/admin/manage-order(page=${i}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}"
                               th:text="${i + 1}"></a>
                        </li>

                        <li class="page-item" th:classappend="${ord.number == ord.totalPages - 1} ? 'disabled'">
                            <a class="page-link rounded-3 border-0 shadow-sm text-dark px-3"
                               th:href="@{/admin/manage-order(page=${ord.number + 1}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}">Next</a>
                        </li>

                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const statusSelects = document.querySelectorAll('.status-select');

        statusSelects.forEach(select => {
            select.addEventListener('change', function () {
                this.classList.remove('status-pending', 'status-processing', 'status-completed', 'status-canceled', 'status-shipped', 'status-paid', 'status-done', 'status-refunded');
                this.classList.add('status-' + this.value);
            });
        });
    });
</script>
</body>
</html>
