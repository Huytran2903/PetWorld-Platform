<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/manage-order.css">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

    <style>
        .main-content {
            background-color: #f8f9fa;
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .status-pending {
            background-color: #fff3cd !important;
            color: #856404 !important;
        }

        .status-paid {
            background-color: #cce5ff !important;
            color: #004085 !important;
        }

        .status-processing {
            background-color: #e2d9f3 !important;
            color: #593196 !important;
        }

        .status-shipped {
            background-color: #d1ecf1 !important;
            color: #0c5460 !important;
        }

        .status-done {
            background-color: #d4edda !important;
            color: #155724 !important;
        }

        .status-canceled {
            background-color: #f8d7da !important;
            color: #721c24 !important;
        }

        .status-refunded {
            background-color: #e2e3e5 !important;
            color: #383d41 !important;
        }

        .status-select {
            border-radius: 50px;
            padding: 5px 15px;
            text-align: center;
            font-size: 0.825rem;
            cursor: pointer;
            width: 120px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg...");
            background-repeat: no-repeat;
            background-position: right .5rem top 50%;
            background-size: .5rem auto;
        }

        .custom-table th {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #6c757d;
            border-bottom: 2px solid #eee;
        }

        .item-thumb {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .text-price {
            color: #d63384;
            font-weight: 700;
        }

        .modal-content {
            border-radius: 20px;
            border: none;
        }
    </style>
</head>
<body class="bg-light m-0 p-0 overflow-hidden">

<div class="d-flex min-vh-100 w-100">
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='orders')}"></div>

    <div class="flex-grow-1 p-4 p-md-5 main-content">
        <div class="mb-4 p-4 rounded-4 d-flex justify-content-between align-items-center shadow-sm bg-white border">
            <div class="d-flex align-items-center">
                <div class="bg-warning bg-opacity-10 p-3 rounded-4 me-3">
                    <i class="bi bi-bag-check-fill text-warning fs-3"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0 text-dark">Orders Management</h2>
                    <p class="text-muted mb-0 small">Track and update all customer transactions.</p>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 w-100">
            <div class="card-body p-4">

                <form th:action="@{/admin/manage-order}" method="get"
                      class="row g-3 mb-4 p-3 rounded-4 bg-light border">
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">From</label>
                        <input type="date" id="startDate" name="startDate" th:value="${startDate}"
                               class="form-control form-control-sm rounded-pill">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">To</label>
                        <input type="date" id="endDate" name="endDate" th:value="${endDate}"
                               class="form-control form-control-sm rounded-pill">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Status</label>
                        <select name="statusFilter" class="form-select form-select-sm rounded-pill">
                            <option value="">All Statuses</option>
                            <option value="pending" th:selected="${statusFilter == 'pending'}">Pending</option>
                            <option value="paid" th:selected="${statusFilter == 'paid'}">Paid</option>
                            <option value="done" th:selected="${statusFilter == 'done'}">Done</option>
                            <option value="canceled" th:selected="${statusFilter == 'canceled'}">Canceled</option>
                        </select>
                    </div>
                    <div class="col-md-5 d-flex gap-2 align-items-end">
                        <button type="submit" class="btn btn-warning btn-sm rounded-pill px-4 fw-bold w-100">Filter
                        </button>
                        <a th:href="@{/admin/manage-order}"
                           class="btn btn-outline-secondary btn-sm rounded-pill px-3"><i
                                class="bi bi-arrow-clockwise"></i></a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table custom-table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th class="py-3 ps-3">ORDER INFO</th>
                            <th class="py-3">ITEMS</th>
                            <th class="py-3">CUSTOMER</th>
                            <th class="py-3 text-center">STATUS</th>
                            <th class="py-3 text-end">TOTAL</th>
                            <th class="py-3 text-center">ACTION</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${ord}">
                            <td class="ps-3">
                                <div class="fw-bold text-primary mb-1" th:text="${o.orderCode}"></div>
                                <div class="text-muted small"
                                     th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                            </td>

                            <td>
                                <div class="d-flex flex-column gap-2">
                                    <div th:each="item, iterStat : ${o.orderItems}" th:if="${iterStat.index < 2}"
                                         class="d-flex align-items-center gap-2">
                                        <div class="flex-shrink-0 border rounded bg-white d-flex align-items-center justify-content-center"
                                             style="width: 40px; height: 40px; overflow: hidden;">
                                            <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                                                 th:src="@{${item.imageUrl}}" class="w-100 h-100 object-fit-cover">
                                            <i th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                                               class="bi bi-box-seam text-muted"></i>
                                        </div>
                                        <div class="small text-truncate" style="max-width: 150px;"
                                             th:text="${item.itemName}"></div>
                                    </div>
                                    <div th:if="${#lists.size(o.orderItems) > 2}" class="text-muted"
                                         style="font-size: 0.7rem;">
                                        + <span th:text="${#lists.size(o.orderItems) - 2}"></span> more items...
                                    </div>
                                </div>
                            </td>

                            <td>
                                <div class="fw-bold" th:text="${o.shipName}"></div>
                                <div class="text-muted small" th:text="${o.shipPhone}"></div>
                            </td>
                            <td class="text-center">
                                <form th:action="@{/admin/orders/update-status}" method="post">
                                    <input type="hidden" name="orderID" th:value="${o.orderID}">
                                    <select name="status" class="status-select fw-bold"
                                            th:classappend="'status-' + ${o.status}" onchange="this.form.submit()"
                                            th:disabled="${o.status == 'done' or o.status == 'canceled'}">
                                        <option value="pending" th:selected="${o.status == 'pending'}">Pending</option>
                                        <option value="paid" th:selected="${o.status == 'paid'}">Paid</option>
                                        <option value="processing" th:selected="${o.status == 'processing'}">
                                            Processing
                                        </option>
                                        <option value="shipped" th:selected="${o.status == 'shipped'}">Shipped</option>
                                        <option value="done" th:selected="${o.status == 'done'}">Done</option>
                                        <option value="canceled" th:selected="${o.status == 'canceled'}">Canceled
                                        </option>
                                    </select>
                                </form>
                            </td>
                            <td class="text-end fw-bold text-price pe-3"
                                th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td class="text-center">
                                <button class="btn btn-light btn-sm border shadow-sm rounded-circle"
                                        data-bs-toggle="modal" th:data-bs-target="'#orderModal-' + ${o.orderID}">
                                    <i class="bi bi-eye-fill"></i>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${ord.totalPages > 1}" class="mt-4">
                </nav>
            </div>
        </div>
    </div>
</div>

<th:block th:each="o : ${ord}">
    <div class="modal fade" th:id="'orderModal-' + ${o.orderID}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold">Order Details: <span class="text-primary" th:text="${o.orderCode}"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="list-group list-group-flush border rounded-4 overflow-hidden mb-4">
                        <div class="list-group-item p-3" th:each="item : ${o.orderItems}">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex gap-3 align-items-center">
                                    <div class="border rounded bg-light d-flex align-items-center justify-content-center"
                                         style="width: 55px; height: 55px; overflow: hidden;">
                                        <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                                             th:src="@{${item.imageUrl}}" class="w-100 h-100 object-fit-cover">
                                        <i th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                                           class="bi bi-box-seam fs-4 text-muted"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${item.itemName}"></div>
                                        <small class="text-muted">Quantity: [[${item.quantity}]] | Category: <span
                                                th:text="${item.pet != null ? 'Pet' : 'Product'}"></span></small>
                                    </div>
                                </div>
                                <div class="fw-bold text-price"
                                     th:text="${#numbers.formatDecimal(item.unitPrice * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="p-3 rounded-4 bg-light h-100 border text-dark">
                                <h6 class="fw-bold mb-2"><i class="bi bi-truck me-2"></i>Shipping Info</h6>
                                <div class="small">
                                    <div class="fw-bold" th:text="${o.shipName}"></div>
                                    <div th:text="${o.shipPhone}"></div>
                                    <div class="text-muted" th:text="${o.shipAddress}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 rounded-4 bg-light border text-dark">
                                <div class="d-flex justify-content-between small mb-1">
                                    <span>Subtotal:</span>
                                    <span th:text="${#numbers.formatDecimal(o.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                </div>
                                <div class="d-flex justify-content-between small mb-2">
                                    <span>Shipping:</span>
                                    <span th:text="${#numbers.formatDecimal(o.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                </div>
                                <hr class="my-2">
                                <div class="d-flex justify-content-between fw-bold fs-5">
                                    <span>Total:</span>
                                    <span class="text-price"
                                          th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
