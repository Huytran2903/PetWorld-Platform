<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="/css/manage-order.css">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

</head>
<body class="bg-light">

<div class="d-flex min-vh-100">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='orders')}"></div>

    <div class="container-fluid max-w-custom p-4 flex-grow-1 w-100">

        <div class="header-card mb-4 p-4 rounded-4 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1 d-flex align-items-center">
                    <i class="bi bi-box-seam text-warning me-3"></i> Orders Management
                </h2>
                <p class="text-muted mb-0 ms-5">Manage customer orders and transactions.</p>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

                <div class="row mb-4 gx-3">
                    <div class="col-md-5">
                        <div class="input-group search-group rounded-pill">
                            <span class="input-group-text bg-transparent border-end-0 pe-1 ps-3 text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control bg-transparent border-start-0 shadow-none ps-2"
                                   placeholder="Search order by ID or customer...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select rounded-pill shadow-none text-muted filter-select">
                            <option selected>All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table custom-table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ORDER ID</th>
                            <th>CUSTOMER NAME</th>
                            <th>DATE</th>
                            <th>STATUS</th>
                            <th>TOTAL</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${ord}">
                            <td class="fw-bold text-dark" th:text="${o.getOrderID()}"></td>
                            <td class="fw-bold text-dark" th:text="${o.getShipName()}">Alice Smith</td>
                            <td class="text-muted" th:text="${#temporals.format(o.createdAt, 'MMM dd, yyyy')}"></td>
                            <td>
                                <form th:action="@{/admin/orders/update-status}" method="post" class="m-0">
                                    <input type="hidden" name="orderID" th:value="${o.orderID}">

                                    <select name="status"
                                            class="form-select form-select-sm status-select border-0 shadow-none fw-semibold"
                                            th:classappend="'status-' + ${o.status}"
                                            onchange="this.form.submit()"
                                            th:disabled="${o.status == 'done' or o.status == 'canceled'}">

                                        <option value="pending" th:selected="${o.status == 'pending'}"
                                                th:if="${o.status != 'paid' and o.status != 'shipped'}">Pending
                                        </option>

                                        <option value="paid" th:selected="${o.status == 'paid'}">Paid</option>
                                        <option value="processing" th:selected="${o.status == 'processing'}">
                                            Processing
                                        </option>
                                        <option value="shipped" th:selected="${o.status == 'shipped'}">Shipped</option>
                                        <option value="done" th:selected="${o.status == 'done'}">Done</option>
                                        <option value="canceled" th:selected="${o.status == 'canceled'}"
                                                th:if="${o.status != 'paid' and o.status != 'shipped'}">Canceled
                                        </option>
                                        <option value="refunded" th:selected="${o.status == 'refunded'}">Refunded
                                        </option>
                                    </select>
                                </form>
                            </td>
                            <td class="text-muted fw-bold"
                                th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const statusSelects = document.querySelectorAll('.status-select');

        statusSelects.forEach(select => {
            select.addEventListener('change', function () {
                // Xóa tất cả các class màu cũ
                this.classList.remove('status-pending', 'status-processing', 'status-completed', 'status-cancelled');

                // Thêm class màu mới tương ứng với option vừa chọn
                this.classList.add('status-' + this.value);
            });
        });
    });
</script>
</body>
</html>
