<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="/css/manage-order.css">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

</head>
<body class="bg-light">

<div class="d-flex min-vh-100">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='orders')}"></div>

    <div class="container-fluid max-w-custom p-4 flex-grow-1 w-100">

        <div class="header-card mb-4 p-4 rounded-4 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1 d-flex align-items-center">
                    <i class="bi bi-box-seam text-warning me-3"></i> Orders Management
                </h2>
                <p class="text-muted mb-0 ms-5">Manage customer orders and transactions.</p>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

            <form th:action="@{/admin/manage-order}" method="get" class="row g-3 mb-4 align-items-end filter-section p-3 rounded-3">
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">From Date</label>
                    <input type="date" name="startDate" th:value="${startDate}" class="form-control rounded-pill shadow-none">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">To Date</label>
                    <input type="date" name="endDate" th:value="${endDate}" class="form-control rounded-pill shadow-none">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Status</label>
                    <select name="statusFilter" class="form-select rounded-pill shadow-none text-muted">
                        <option value="" th:selected="${statusFilter == null || statusFilter == ''}">All Statuses</option>
                        <option value="pending" th:selected="${statusFilter == 'pending'}">Pending</option>
                        <option value="paid" th:selected="${statusFilter == 'paid'}">Paid</option>
                        <option value="processing" th:selected="${statusFilter == 'processing'}">Processing</option>
                        <option value="shipped" th:selected="${statusFilter == 'shipped'}">Shipped</option>
                        <option value="done" th:selected="${statusFilter == 'done'}">Done</option>
                        <option value="canceled" th:selected="${statusFilter == 'canceled'}">Canceled</option>
                        <option value="refunded" th:selected="${statusFilter == 'refunded'}">Refunded</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-warning rounded-pill px-4 fw-bold w-100 text-white shadow-sm">
                        <i class="bi bi-filter me-1"></i> Apply Filters
                    </button>
                    <a th:href="@{/admin/manage-order}" class="btn btn-outline-secondary rounded-pill px-3 shadow-none border-1" title="Reset Filters">
                        <i class="bi bi-arrow-clockwise"></i>
                    </a>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="py-3">ORDER ID</th>
                        <th class="py-3">CUSTOMER NAME</th>
                        <th class="py-3">ORDER DATE</th>
                        <th class="py-3">STATUS</th>
                        <th class="py-3 text-end">TOTAL AMOUNT</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="o : ${ord}">
                        <td class="fw-bold text-dark" th:text="'#' + ${o.orderID}"></td>
                        <td class="fw-bold text-dark" th:text="${o.shipName}">Alice Smith</td>
                        <td class="text-muted" th:text="${#temporals.format(o.createdAt, 'MMM dd, yyyy')}"></td>
                        <td>
                            <form th:action="@{/admin/orders/update-status}" method="post" class="m-0">
                                <input type="hidden" name="orderID" th:value="${o.orderID}">

                                    <select name="status"
                                            class="form-select form-select-sm status-select border-0 shadow-none fw-semibold"
                                            th:classappend="'status-' + ${o.status}"
                                            onchange="this.form.submit()"
                                            th:disabled="${o.status == 'done' or o.status == 'canceled'}">

                                    <option value="pending" th:selected="${o.status == 'pending'}"
                                            th:if="${o.status != 'paid' and o.status != 'shipped'}">Pending</option>

                                    <option value="paid" th:selected="${o.status == 'paid'}">Paid</option>
                                    <option value="processing" th:selected="${o.status == 'processing'}">Processing</option>
                                    <option value="shipped" th:selected="${o.status == 'shipped'}">Shipped</option>
                                    <option value="done" th:selected="${o.status == 'done'}">Done</option>
                                    <option value="canceled" th:selected="${o.status == 'canceled'}"
                                            th:if="${o.status != 'paid' and o.status != 'shipped'}">Canceled</option>
                                    <option value="refunded" th:selected="${o.status == 'refunded'}">Refunded</option>
                                </select>
                            </form>
                        </td>
                        <td class="text-dark fw-bold text-end" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></td>
                    </tr>
                    <tr th:if="${ord.isEmpty()}">
                        <td colspan="5" class="text-center py-5">
                            <i class="bi bi-search text-muted display-6 d-block mb-3"></i>
                            <span class="text-muted">No orders found matching your criteria.</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${ord.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center mb-0">

                    <li class="page-item" th:classappend="${ord.number == 0} ? 'disabled'">
                        <a class="page-link shadow-sm"
                           th:href="@{/admin/manage-order(page=${ord.number - 1}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}">Previous</a>
                    </li>

                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, ord.totalPages - 1)}"
                        th:classappend="${i == ord.number} ? 'active'">
                        <a class="page-link shadow-sm"
                           th:href="@{/admin/manage-order(page=${i}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${ord.number == ord.totalPages - 1} ? 'disabled'">
                        <a class="page-link shadow-sm"
                           th:href="@{/admin/manage-order(page=${ord.number + 1}, startDate=${startDate}, endDate=${endDate}, statusFilter=${statusFilter})}">Next</a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const statusSelects = document.querySelectorAll('.status-select');

        statusSelects.forEach(select => {
            select.addEventListener('change', function() {
                // Clear old color classes
                this.classList.remove('status-pending', 'status-processing', 'status-completed', 'status-cancelled', 'status-shipped', 'status-paid', 'status-done', 'status-refunded');
                // Add new color class
                this.classList.add('status-' + this.value);
            });
        });
    });
</script>
</body>
</html>
