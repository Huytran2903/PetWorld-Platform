<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>Order History - PetWorld</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-bg: #F8F9FA;
      --pet-orange: #FF8C00; /* Màu cam chủ đạo của bạn */
      --price-color: #d63384;
    }
    body { font-family: 'Arimo', sans-serif; background-color: var(--primary-bg); }

    /* HEADER MÀU CAM BAN ĐẦU */
    .header-section {
      background: #FFA54F;
      color: white;
      border-bottom: none;
      box-shadow: 0 4px 12px rgba(255, 140, 0, 0.2);
    }
    .header-section p { color: rgba(255, 255, 255, 0.9) !important; }

    .card { transition: all 0.2s ease; border: none; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important; }

    /* Badge Status Styles */
    .badge-pending { background-color: #fff3cd; color: #856404; }
    .badge-paid { background-color: #cce5ff; color: #004085; }
    .badge-processing { background-color: #e2d9f3; color: #593196; }
    .badge-shipped { background-color: #d1ecf1; color: #0c5460; }
    .badge-done { background-color: #d4edda; color: #155724; }
    .badge-canceled { background-color: #f8d7da; color: #721c24; }

    .text-price { color: var(--price-color); font-size: 1.1rem; font-weight: 700; }
    .modal-content { border-radius: 20px; border: none; }
    .btn-cancel { border-radius: 50px; padding: 8px 25px; }
    .order-icon-box {
      width: 56px; height: 56px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<main class="order-history-design min-vh-100 d-flex flex-column">

  <section class="container-fluid py-5 px-lg-5 header-section mb-4">
    <div class="container-fluid d-flex align-items-center">
      <div class="order-icon-box me-3">
        <i class="bi bi-box-seam text-white" style="font-size: 1.8rem;"></i>
      </div>
      <div>
        <h1 class="display-6 fw-bold mb-1">Order history</h1>
        <p class="mb-0">Manage and track your orders efficiently.</p>
      </div>
    </div>
  </section>

  <section class="container-fluid px-lg-5 flex-grow-1">
    <div class="container-fluid">

      <div th:if="${param.canceledSuccess}" class="alert alert-success alert-dismissible fade show rounded-4 mb-4 shadow-sm">
        <i class="bi bi-check-circle-fill me-2"></i> Yêu cầu hủy đơn hàng đã được thực hiện!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="d-flex flex-column gap-3">
        <th:block th:each="ord : ${orderHistory}">

          <article class="card shadow-sm rounded-4">
            <div class="card-body p-3 p-md-4">
              <a href="javascript:void(0)" class="text-decoration-none text-dark d-flex align-items-center justify-content-between"
                 data-bs-toggle="modal"
                 th:data-bs-target="'#orderModal-' + ${ord.orderID}">

                <div class="d-flex align-items-start gap-3 w-100">
                  <div class="d-flex align-items-center justify-content-center flex-shrink-0"
                       style="width: 56px; height: 56px; background-color: #f0f0f0; border-radius: 14px;">
                    <i class="bi bi-receipt" style="font-size: 1.5rem; color: var(--pet-orange);"></i>
                  </div>

                  <div class="flex-grow-1">
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                      <h2 class="h5 fw-bold mb-0" th:text="${ord.orderCode}"></h2>
                      <span class="badge rounded-pill text-uppercase px-3"
                            th:classappend="'badge-' + ${ord.status}"
                            th:text="${ord.status}"></span>
                    </div>
                    <div class="d-flex flex-column flex-sm-row gap-sm-3 text-secondary mb-2 small">
                      <span><i class="bi bi-calendar3 me-1"></i> <span th:text="${#temporals.format(ord.createdAt, 'dd/MM/yyyy')}"></span></span>
                      <span class="d-none d-sm-inline">•</span>
                      <span><i class="bi bi-bag-check me-1"></i> <span th:text="${#aggregates.sum(ord.orderItems.![quantity])} + ' items'"></span></span>
                    </div>
                    <p class="text-price mb-0"
                       th:text="${#numbers.formatDecimal(ord.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </p>
                  </div>
                </div>
                <i class="bi bi-chevron-right text-muted ms-3"></i>
              </a>
            </div>
          </article>

          <div class="modal fade" th:id="'orderModal-' + ${ord.orderID}" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
              <div class="modal-content shadow-lg">
                <div class="modal-header border-bottom-0 p-4 pb-0">
                  <div>
                    <h5 class="modal-title fw-bold text-dark" th:text="${ord.orderCode}"></h5>
                    <small class="text-muted" th:text="'Order date: ' + ${#temporals.format(ord.createdAt, 'HH:mm dd/MM/yyyy')}"></small>
                  </div>
                  <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4">
                  <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold mb-0">Order Summary</h6>
                    <span class="badge rounded-pill px-3 py-2 text-uppercase"
                          th:classappend="'badge-' + ${ord.status}"
                          th:text="${ord.status}"></span>
                  </div>

                  <div class="list-group list-group-flush border rounded-4 overflow-hidden mb-4">
                    <div class="list-group-item p-3" th:each="item : ${ord.orderItems}">
                      <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex gap-3 align-items-center">
                          <div class="bg-light rounded p-2">
                            <i class="bi bi-tencent-qq text-warning" th:if="${item.petID != null}"></i>
                            <i class="bi bi-box-seam text-secondary" th:if="${item.petID == null}"></i>
                          </div>
                          <div>
                            <div class="fw-bold mb-0" th:text="${item.itemName}"></div>
                            <small class="text-muted">Qty: [[${item.quantity}]]</small>
                          </div>
                        </div>
                        <div class="fw-bold" th:text="${#numbers.formatDecimal(item.unitPrice * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                      </div>
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="p-3 rounded-4 h-100" style="background-color: #f8f9fa; border: 1px solid #eee;">
                        <h6 class="fw-bold mb-3 text-dark"><i class="bi bi-truck me-2 text-warning"></i>Shipping Info</h6>
                        <div class="small">
                          <div class="fw-bold mb-1" th:text="${ord.shipName}"></div>
                          <div class="mb-1 text-muted" th:text="${ord.shipPhone}"></div>
                          <div class="text-muted" th:text="${ord.shipAddress}"></div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="p-3 rounded-4 h-100" style="background-color: #f8f9fa; border: 1px solid #eee;">
                        <div class="d-flex justify-content-between mb-2 small">
                          <span class="text-muted">Subtotal</span>
                          <span th:text="${#numbers.formatDecimal(ord.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small">
                          <span class="text-muted">Shipping Fee</span>
                          <span th:text="${#numbers.formatDecimal(ord.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <hr class="my-2">
                        <div class="d-flex justify-content-between fw-bold fs-5">
                          <span>Total</span>
                          <span class="text-price" th:text="${#numbers.formatDecimal(ord.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="modal-footer border-top-0 px-4 pb-4 justify-content-start">
                  <form th:if="${ord.status == 'pending'}"
                        th:action="@{'/orders/cancel/' + ${ord.getOrderID()}}"
                        method="post"
                        onsubmit="return confirm('Bạn có chắc chắn muốn hủy đơn hàng này không?');">
                    <button type="submit" class="btn btn-outline-danger btn-cancel fw-bold shadow-sm">
                      <i class="bi bi-trash3 me-2"></i> Cancel Order
                    </button>
                  </form>

                  <div th:if="${ord.status == 'canceled'}" class="alert alert-secondary py-2 px-3 mb-0 rounded-pill small">
                    <i class="bi bi-info-circle me-1"></i> This order was canceled.
                  </div>
                  <div th:if="${ord.status != 'pending' and ord.status != 'canceled'}" class="text-muted small">
                    <i class="bi bi-lock-fill me-1"></i> Order is being processed. Cancellation locked.
                  </div>
                </div>
              </div>
            </div>
          </div> </th:block>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
