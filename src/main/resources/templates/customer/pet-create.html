<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout_user}">
<head>
    <title>Create Pet Profile</title>
    <link rel="stylesheet" th:href="@{/css/booking.css}" />
</head>
<body>
<main layout:fragment="content" class="container py-4">
    <div class="card">
        <header class="card-header">
            <div>
                <h1 class="title">Create Pet Profile</h1>
                <p class="subtitle">Add your pet to book service appointments.</p>
            </div>
        </header>
        <div class="card-body">
            <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>
            <form th:action="@{/customer/pet/create}" th:object="${petDTO}" method="post">
                <input type="hidden" th:field="*{createPetOwnerType}" />
                <input type="hidden" th:field="*{ownerId}" />

                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="name">Pet Name <span class="text-danger">*</span></label>
                        <input type="text" id="name" th:field="*{name}" required class="form-control" placeholder="e.g. LuLu" />
                    </div>
                    <div>
                        <label for="species">Species</label>
                        <select id="species" th:field="*{species}" class="form-control">
                            <option value="dog">Dog</option>
                            <option value="cat">Cat</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="breed">Breed</label>
                        <input type="text" id="breed" th:field="*{breed}" class="form-control" placeholder="e.g. Corgi" />
                    </div>
                    <div>
                        <label for="age">Age (Months)</label>
                        <input type="number" id="age" th:field="*{age}" min="0" class="form-control" />
                    </div>
                </div>

                <div class="mt-3">
                    <label for="description">Description / Notes</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Allergies, special needs..."></textarea>
                </div>

                <div class="actions mt-4">
                    <button type="submit" class="btn btn-primary">Create Pet Profile</button>
                    <a th:href="@{/appointment/booking}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
